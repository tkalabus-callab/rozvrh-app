<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Plán trenéra</title>
<link rel="stylesheet" href="styles.css">
<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--color-bg);
    color: #1f2d3d;
  }

  .page-header {
    background: var(--color-header);
    color: #fff;
    margin-bottom: 16px;
  }

  .page-header-inner {
    width: 100%;
    margin: 0;
    display: flex;
    flex-direction: column;
  }

  .top-toolbar {
    display: flex;
    justify-content: center;
    order: 2;
    padding: 14px 20px;
    margin-bottom: 0;
  }

  .top-toolbar-left {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .top-toolbar-left a {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 150px;
    padding: 12px 18px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 700;
    font-size: 16px;
    background: var(--color-primary);
    color: #111;
    box-shadow: 0 3px 8px rgba(0,0,0,0.18);
  }

  .page-header h2 {
    order: 1;
    margin: 0;
    padding: 16px;
    background: var(--color-header);
    border-bottom: 5px solid var(--color-primary);
    box-shadow: 0 4px 14px rgba(0,0,0,0.18);
    text-align: center;
    font-size: 30px;
    font-weight: 900;
    letter-spacing: 1px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.35);
    text-transform: uppercase;
  }

  .page-action-box,
  .section-title,
  .school-detail-panel {
    width: min(960px, calc(100% - 32px));
    margin: 0 auto 16px;
  }

  .page-action-box,
  .school-detail-panel {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: 14px;
    padding: 16px;
  }

  .page-action-box {
    background: var(--color-primary);
  }

  #trainerPlanHeader {
    font-size: 18px;
    line-height: 1.45;
    margin-bottom: 14px;
    color: #0d2230;
  }

  #trainerPlanActions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  #trainerPlanActions button {
    padding: 10px 16px;
    border-radius: 8px;
    border: 1px solid rgba(44,62,85,0.18);
    background: #fff;
    color: var(--color-header);
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,0.12);
  }

  #trainerPlanActions button:hover {
    transform: translateY(-1px);
  }

  #backToScheduleButton {
    background: var(--color-header);
    color: #fff;
    border-color: var(--color-header);
  }

  #trainerPlanContent {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  #trainerPlanContent.month-layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    align-items: start;
  }

.day-block {
    background: #f9fbfd;
    border: 1px solid var(--color-border);
    border-radius: 10px;
    padding: 12px 14px;
}

.day-title {
    font-weight: 700;
    color: var(--color-header);
    margin-bottom: 8px;
    font-size: 20px;
  }

  .day-table {
    width: 100%;
    border-collapse: collapse;
    background: #fff;
    border: 1px solid var(--color-border);
    border-radius: 8px;
    overflow: hidden;
  }

  .day-table th,
  .day-table td {
    padding: 8px 10px;
    border-bottom: 1px solid var(--color-border);
    text-align: left;
    font-size: 15px;
  }

  .day-table th {
    background: var(--color-header);
    color: #fff;
    font-weight: 700;
    font-size: 14px;
  }

  .day-table tr:last-child td {
    border-bottom: none;
  }

  .day-table .col-date {
    width: 140px;
    white-space: nowrap;
  }

  .day-table .col-hour {
    width: 110px;
    white-space: nowrap;
  }

  .day-table .col-year,
  .day-table .col-class {
    width: 110px;
    white-space: nowrap;
  }

  #trainerPlanContent.month-layout .day-block {
    display: none;
  }

  .month-column-table {
    width: 100%;
    border-collapse: collapse;
    background: #fff;
    border: 1px solid var(--color-border);
    border-radius: 10px;
    overflow: hidden;
  }

  .month-column-table th,
  .month-column-table td {
    padding: 5px 7px;
    font-size: 13px;
    line-height: 1.2;
    text-align: left;
    border-bottom: 1px solid var(--color-border);
  }

  .month-column-table th {
    background: var(--color-header);
    color: #fff;
    font-weight: 700;
    font-size: 12px;
  }

  .month-column-table tr:last-child td {
    border-bottom: none;
  }

  .month-column-table .col-date {
    width: 84px;
    white-space: nowrap;
  }

  .month-column-table .col-hour {
    width: 58px;
    white-space: nowrap;
  }

  .month-column-table .col-school {
    width: 34%;
  }

  .month-column-table .col-place {
    width: 17%;
  }

  .month-column-table .col-year,
  .month-column-table .col-class {
    width: 44px;
    white-space: nowrap;
    text-align: center;
  }

  .month-column-table td.col-year,
  .month-column-table td.col-class {
    padding-left: 4px;
    padding-right: 4px;
  }

  .month-column-table tr.day-separator td {
    border-top: 3px solid #9fb2c7;
  }

  @media (max-width: 900px) {
    #trainerPlanContent.month-layout {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>

<div class="page-header">
  <div class="page-header-inner">
    <div class="top-toolbar">
      <div class="top-toolbar-left">
        <a href="home.html">Domů</a>
        <a href="index.html">Rozvrh</a>
        <a href="schools.html">Školy</a>
      </div>
    </div>
    <h2>PLÁN TRENÉRA</h2>
  </div>
</div>

<div class="page-shell">
  <div class="page-action-box">
    <div id="trainerPlanHeader"></div>
    <div id="trainerPlanActions" class="detail-action-buttons">
      <button id="exportTrainerPlanPdfButton" type="button">Export PDF</button>
      <button id="exportTrainerPlanExcelButton" type="button">Export Excel</button>
      <button id="emailTrainerPlanButton" type="button">Poslat e-mailem</button>
      <button id="backToScheduleButton" type="button">Zpět do rozvrhu</button>
    </div>
  </div>

  <div id="trainerPlanSummaryTitle" class="section-title"></div>
  <div class="school-detail-panel">
    <div id="trainerPlanContent"></div>
  </div>
</div>

<script>
const trainerPlanHeader = document.getElementById("trainerPlanHeader");
const trainerPlanContent = document.getElementById("trainerPlanContent");
const exportTrainerPlanExcelButton = document.getElementById("exportTrainerPlanExcelButton");
const backToScheduleButton = document.getElementById("backToScheduleButton");

function formatDate(date){
  return new Date(date).toISOString().split("T")[0];
}

function normalizeDateKey(date){
  return formatDate(date);
}

function getMonday(date){
  const value = new Date(date);
  const day = value.getDay();
  const diff = value.getDate() - day + (day === 0 ? -6 : 1);
  return new Date(value.setDate(diff));
}

function getWeekRange(anchorDate){
  const start = getMonday(anchorDate);
  const end = new Date(start);
  end.setDate(end.getDate() + 6);
  return { start, end };
}

function getMonthRange(anchorDate){
  const value = new Date(anchorDate);
  const start = new Date(value.getFullYear(), value.getMonth(), 1);
  const end = new Date(value.getFullYear(), value.getMonth() + 1, 0);
  return { start, end };
}

function isDateInRange(dateStr, start, end){
  const value = normalizeDateKey(dateStr);
  return value >= normalizeDateKey(start) && value <= normalizeDateKey(end);
}

function load(key, fallback){
  try {
    const data = localStorage.getItem(key);
    return data ? JSON.parse(data) : fallback;
  } catch {
    return fallback;
  }
}

function parseKey(key){
  const parts = key.split("_");

  if(parts.length === 4){
    const [date, year, cls, hour] = parts;
    return { date, year, cls, hour: Number(hour) };
  }

  const [date, cls, hour] = parts;
  return { date, year: null, cls, hour: Number(hour) };
}

function getTrainerById(trainerId){
  return load("trainers", []).find(trainer => String(trainer.id) === String(trainerId)) || null;
}

function getSchoolById(schoolId){
  return load("schools", []).find(school => String(school.id) === String(schoolId)) || null;
}

function getSchoolPlace(school){
  if(!school) return "-";
  return school.mesto || school.city || "-";
}

function getStoredTrainerId(value){
  return value && typeof value === "object" ? value.trainerId : value;
}

function normalizePlanEntry(key, value){
  const parsed = parseKey(key);
  const isObjectValue = !!value && typeof value === "object";

  return {
    trainerId: getStoredTrainerId(value),
    schoolId: isObjectValue ? String(value.schoolId ?? "") : "",
    date: isObjectValue ? value.date || parsed.date : parsed.date,
    year: isObjectValue ? value.year || parsed.year || "" : parsed.year || "",
    className: isObjectValue ? value.className || parsed.cls : parsed.cls,
    hour: isObjectValue ? Number(value.hour ?? parsed.hour) : parsed.hour
  };
}

function getTrainerPlanEntriesForPeriod(trainerId, periodType, anchorDate){
  const plans = load("plans", {});
  const range = periodType === "month"
    ? getMonthRange(anchorDate)
    : getWeekRange(anchorDate);

  return Object.entries(plans)
    .map(([key, value]) => {
      const entry = normalizePlanEntry(key, value);

      if(String(entry.trainerId) !== String(trainerId)) return null;
      if(!entry.date || !isDateInRange(entry.date, range.start, range.end)) return null;

      return {
        date: entry.date,
        schoolId: entry.schoolId,
        year: entry.year,
        className: entry.className,
        hour: entry.hour
      };
    })
    .filter(Boolean)
    .sort((a, b) => {
      if(a.date !== b.date) return a.date.localeCompare(b.date);
      if(Number(a.hour) !== Number(b.hour)) return Number(a.hour) - Number(b.hour);
      return String(a.className).localeCompare(String(b.className));
    });
}

function sanitizeCsvValue(value){
  return String(value ?? "-")
    .replace(/"/g, "\"\"")
    .replace(/\r?\n/g, " ");
}

function sanitizeFileNamePart(value, fallback){
  return String(value || fallback || "value")
    .replace(/[<>:"/\\|?*\x00-\x1F]/g, "-")
    .trim() || fallback || "value";
}

function exportTrainerPlanCsv(){
  const params = new URLSearchParams(window.location.search);
  const trainerId = params.get("trainerId") || "unknown";
  const periodType = params.get("periodType") || "week";
  const periodDate = params.get("periodDate") || "unknown";
  const entries = getTrainerPlanEntriesForPeriod(trainerId, periodType, periodDate);
  const rows = [
    "Datum;Hodina;Škola;Ročník;Třída",
    ...entries.map(entry => {
      const school = getSchoolById(entry.schoolId);
      const values = [
        entry.date || "-",
        entry.hour || "-",
        school?.nazev || "-",
        entry.year || "-",
        entry.className || "-"
      ];

      return values.map(value => `"${sanitizeCsvValue(value)}"`).join(";");
    })
  ];
  const csvContent = "\uFEFF" + rows.join("\r\n");
  const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  const fileName = `trainer-plan-${sanitizeFileNamePart(trainerId, "unknown")}-${sanitizeFileNamePart(periodType, "week")}-${sanitizeFileNamePart(periodDate, "unknown")}.csv`;

  link.href = url;
  link.download = fileName;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
}

function renderTrainerPlanPage(){
  const params = new URLSearchParams(window.location.search);
  const trainerId = params.get("trainerId") || "";
  const periodType = params.get("periodType") || "week";
  const periodDate = params.get("periodDate") || "";
  const trainer = getTrainerById(trainerId);

  if(!trainer){
    trainerPlanHeader.textContent = "";
    trainerPlanContent.className = "";
    trainerPlanContent.textContent = "Trenér nebyl nalezen.";
    return;
  }

  if(!periodDate){
    trainerPlanHeader.textContent = "";
    trainerPlanContent.className = "";
    trainerPlanContent.textContent = "Chybí datum období.";
    return;
  }

  const trainerName = `${trainer.jmeno || ""} ${trainer.prijmeni || ""}`.trim() || trainer.name || "-";
  const periodDateValue = new Date(periodDate);
  const weekRange = getWeekRange(periodDate);
  const periodLabel = periodType === "month"
    ? `${String(periodDateValue.getMonth() + 1).padStart(2, "0")}/${periodDateValue.getFullYear()}`
    : `týden ${weekRange.start.toLocaleDateString("cs-CZ")} - ${weekRange.end.toLocaleDateString("cs-CZ")}`;

  trainerPlanHeader.innerHTML = `<strong>${trainerName}</strong><br>Období: ${periodLabel}`;

  const entries = getTrainerPlanEntriesForPeriod(trainerId, periodType, periodDate);

  if(!entries.length){
    trainerPlanContent.className = "";
    trainerPlanContent.textContent = "Pro zvolené období nebyl nalezen žádný plán.";
    return;
  }

  if(periodType === "month"){
    const days = [];
    let currentDay = null;

    entries.forEach(entry => {
      if(!currentDay || currentDay.date !== entry.date){
        currentDay = { date: entry.date, rows: [] };
        days.push(currentDay);
      }

      const school = getSchoolById(entry.schoolId);
      currentDay.rows.push(`
        <tr>
          <td class="col-date">${new Date(entry.date).toLocaleDateString("cs-CZ", { day: "numeric", month: "2-digit", year: "2-digit" })}</td>
          <td class="col-hour">${entry.hour} hod</td>
          <td class="col-school">${school?.nazev || "-"}</td>
          <td class="col-place">${getSchoolPlace(school)}</td>
          <td class="col-year">${entry.year || "-"}</td>
          <td class="col-class">${entry.className || "-"}</td>
        </tr>
      `);
    });

    const leftDays = [];
    const rightDays = [];
    days.forEach(day => {
      const dayNumber = new Date(day.date).getDate();
      (dayNumber <= 15 ? leftDays : rightDays).push(day);
    });

    function buildMonthColumnTable(dayGroups){
      return `
        <table class="month-column-table">
          <thead>
            <tr>
              <th class="col-date">Datum</th>
              <th class="col-hour">Hodina</th>
              <th class="col-school">Škola</th>
              <th class="col-place">Místo</th>
              <th class="col-year">Ročník</th>
              <th class="col-class">Třída</th>
            </tr>
          </thead>
          <tbody>
            ${dayGroups.map((day, index) => `${index ? '<tr class="day-separator"><td colspan="6"></td></tr>' : ""}${day.rows.join("")}`).join("")}
          </tbody>
        </table>
      `;
    }

    trainerPlanContent.className = "month-layout";
    trainerPlanContent.innerHTML = `
      ${buildMonthColumnTable(leftDays)}
      ${buildMonthColumnTable(rightDays)}
    `;
    return;
  }

  const weekRows = [];
  let lastDate = "";

  entries.forEach(entry => {
    const school = getSchoolById(entry.schoolId);
    const isNewDay = lastDate && entry.date !== lastDate;

    if(isNewDay){
      weekRows.push(`<tr class="day-separator"><td colspan="6"></td></tr>`);
    }

    weekRows.push(`
      <tr>
        <td class="col-date">${new Date(entry.date).toLocaleDateString("cs-CZ", { day: "numeric", month: "2-digit", year: "2-digit" })}</td>
        <td class="col-hour">${entry.hour} hod</td>
        <td class="col-school">${school?.nazev || "-"}</td>
        <td class="col-place">${getSchoolPlace(school)}</td>
        <td class="col-year">${entry.year || "-"}</td>
        <td class="col-class">${entry.className || "-"}</td>
      </tr>
    `);

    lastDate = entry.date;
  });

  trainerPlanContent.className = "";
  trainerPlanContent.innerHTML = `
    <table class="month-column-table">
      <thead>
        <tr>
          <th class="col-date">Datum</th>
          <th class="col-hour">Hodina</th>
          <th class="col-school">Škola</th>
          <th class="col-place">Místo</th>
          <th class="col-year">Ročník</th>
          <th class="col-class">Třída</th>
        </tr>
      </thead>
      <tbody>
        ${weekRows.join("")}
      </tbody>
    </table>
  `;
}

renderTrainerPlanPage();

exportTrainerPlanExcelButton.addEventListener("click", exportTrainerPlanCsv);

backToScheduleButton.addEventListener("click", () => {
  window.location.href = "index.html";
});
</script>

</body>
</html>
