<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Plán trenéra</title>
<link rel="stylesheet" href="styles.css">
<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--color-bg);
    color: #1f2d3d;
  }

  .page-header {
    background: var(--color-header);
    color: #fff;
    margin-bottom: 16px;
  }

  .page-header-inner {
    width: 100%;
    margin: 0;
    display: flex;
    flex-direction: column;
  }

  .top-toolbar {
    display: flex;
    justify-content: center;
    order: 2;
    padding: 14px 20px;
    margin-bottom: 0;
  }

  .top-toolbar-left {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .top-toolbar-left a {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 150px;
    padding: 12px 18px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 700;
    font-size: 16px;
    background: var(--color-primary);
    color: #111;
    box-shadow: 0 3px 8px rgba(0,0,0,0.18);
  }

  .page-header h2 {
    order: 1;
    margin: 0;
    padding: 16px;
    background: var(--color-header);
    border-bottom: 5px solid var(--color-primary);
    box-shadow: 0 4px 14px rgba(0,0,0,0.18);
    text-align: center;
    font-size: 30px;
    font-weight: 900;
    letter-spacing: 1px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.35);
    text-transform: uppercase;
  }

  .page-action-box,
  .section-title,
  .school-detail-panel {
    width: min(960px, calc(100% - 32px));
    margin: 0 auto 16px;
  }

  .page-action-box,
  .school-detail-panel {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: 14px;
    padding: 16px;
  }

  .page-action-box {
    background: var(--color-primary);
  }

  #trainerPlanHeader {
    font-size: 18px;
    line-height: 1.45;
    margin-bottom: 14px;
    color: #0d2230;
  }

  #trainerPlanActions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  #trainerPlanActions button {
    padding: 10px 16px;
    border-radius: 8px;
    border: 1px solid rgba(44,62,85,0.18);
    background: #fff;
    color: var(--color-header);
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,0.12);
  }

  #trainerPlanActions button:hover {
    transform: translateY(-1px);
  }

  #backToScheduleButton {
    background: var(--color-header);
    color: #fff;
    border-color: var(--color-header);
  }

  #trainerPlanContent {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  #trainerPlanContent.month-layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    align-items: start;
  }

.day-block {
    background: #f9fbfd;
    border: 1px solid var(--color-border);
    border-radius: 10px;
    padding: 12px 14px;
}

.day-title {
    font-weight: 700;
    color: var(--color-header);
    margin-bottom: 8px;
    font-size: 20px;
  }

  .day-table {
    width: 100%;
    border-collapse: collapse;
    background: #fff;
    border: 1px solid var(--color-border);
    border-radius: 8px;
    overflow: hidden;
  }

  .day-table th,
  .day-table td {
    padding: 8px 10px;
    border-bottom: 1px solid var(--color-border);
    text-align: left;
    font-size: 15px;
  }

  .day-table th {
    background: var(--color-header);
    color: #fff;
    font-weight: 700;
    font-size: 14px;
  }

  .day-table tr:last-child td {
    border-bottom: none;
  }

  .day-table .col-date {
    width: 140px;
    white-space: nowrap;
  }

  .day-table .col-hour {
    width: 110px;
    white-space: nowrap;
  }

  .day-table .col-year,
  .day-table .col-class {
    width: 110px;
    white-space: nowrap;
  }

  #trainerPlanContent.month-layout .day-block {
    display: none;
  }

  .month-column-table {
    width: 100%;
    border-collapse: collapse;
    background: #fff;
    border: 1px solid var(--color-border);
    border-radius: 10px;
    overflow: hidden;
  }

  .month-column-table th,
  .month-column-table td {
    padding: 5px 7px;
    font-size: 13px;
    line-height: 1.2;
    text-align: left;
    border-bottom: 1px solid var(--color-border);
  }

  .month-column-table th {
    background: var(--color-header);
    color: #fff;
    font-weight: 700;
    font-size: 12px;
  }

  .month-column-table tr:last-child td {
    border-bottom: none;
  }

  .month-column-table .col-date {
    width: 84px;
    white-space: nowrap;
  }

  .month-column-table .col-hour {
    width: 58px;
    white-space: nowrap;
  }

  .month-column-table .col-school {
    width: 34%;
  }

  .month-column-table .col-place {
    width: 17%;
  }

  .month-column-table .col-year,
  .month-column-table .col-class {
    width: 44px;
    white-space: nowrap;
    text-align: center;
  }

  .month-column-table td.col-year,
  .month-column-table td.col-class {
    padding-left: 4px;
    padding-right: 4px;
  }

  .month-column-table tr.day-separator td {
    border-top: 3px solid #9fb2c7;
  }

  @media (max-width: 900px) {
    #trainerPlanContent.month-layout {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>
<script>
(function(){
  const managerLoggedIn = sessionStorage.getItem("managerModeUnlocked") === "1";
  const caretakerId = localStorage.getItem("caretakerId") || "";
  const sessionCaretakerId = sessionStorage.getItem("caretakerModeUnlocked") || "";
  let caretakers = [];
  try { caretakers = JSON.parse(localStorage.getItem("caretakers") || "[]"); } catch {}
  const caretakerLoggedIn = Boolean(
    caretakerId &&
    sessionCaretakerId &&
    String(caretakerId) === String(sessionCaretakerId) &&
    caretakers.some(item => String(item.id) === String(caretakerId))
  );
  if(!managerLoggedIn && !caretakerLoggedIn){
    window.location.replace("home.html");
  }
})();
</script>

  <div class="page-header">
  <div class="page-header-inner">
    <div class="top-toolbar">
      <div class="top-toolbar-left">
        <a href="home.html">Domů</a>
        <a href="index.html">Rozvrh</a>
        <a href="trainers.html">Trenéři</a>
        <a href="schools.html">Školy</a>
      </div>
    </div>
    <h2>PLÁN TRENÉRA</h2>
  </div>
</div>

<div class="page-shell">
  <div class="page-action-box">
    <div id="trainerPlanHeader"></div>
    <div id="trainerPlanActions" class="detail-action-buttons">
      <button id="exportTrainerPlanPdfButton" type="button">Export PDF</button>
      <button id="exportTrainerPlanExcelButton" type="button">Export Excel</button>
      <button id="emailTrainerPlanButton" type="button">Poslat e-mailem</button>
      <button id="backToScheduleButton" type="button">Zpět na trenéry</button>
    </div>
  </div>

  <div id="trainerPlanSummaryTitle" class="section-title"></div>
  <div class="school-detail-panel">
    <div id="trainerPlanContent"></div>
  </div>
</div>

<script src="trainer-plan.js?v=20260429-2"></script>

</body>
</html>
