<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Manažeři</title>
<link rel="stylesheet" href="styles.css">

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:var(--color-bg);
  color:var(--color-text);
}

.manager-shell {
  width:100%;
  max-width:var(--content-max-width);
  margin:16px auto 36px;
  padding:0 20px;
  box-sizing:border-box;
}

.manager-info-panel {
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:14px;
  flex-wrap:wrap;
  margin:16px auto;
  padding:16px 18px;
  width:100%;
  max-width:var(--content-max-width);
  border:1px solid var(--color-border);
  border-radius:10px;
  background:#ffffff;
  box-shadow:0 6px 18px rgba(44,62,85,0.08);
  box-sizing:border-box;
}

.manager-info-title {
  margin:0 0 6px;
  color:var(--color-header);
  font-size:18px;
  font-weight:800;
  text-transform:uppercase;
}

.manager-info-text {
  margin:0;
  color:#4b5c70;
  line-height:1.45;
}

.manager-tools {
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

.manager-tools input,
.manager-tools select,
.assignment-select {
  height:34px;
  margin:0;
  padding:6px 8px;
  width:220px;
  border:1px solid var(--color-border);
  border-radius:6px;
  box-sizing:border-box;
  color:var(--color-text);
  background:#ffffff;
}

input:focus,
select:focus {
  outline:2px solid var(--color-primary);
  outline-offset:1px;
  border-color:var(--color-primary);
}

button {
  min-height:34px;
  padding:0 12px;
  border:1px solid var(--color-primary);
  border-radius:8px;
  background:var(--color-primary);
  color:#000000;
  font-weight:700;
  line-height:1;
  cursor:pointer;
  box-shadow:0 2px 6px rgba(0,0,0,0.18);
  transition:background 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
}

button:hover,
button:focus {
  background:var(--color-primary-dark);
  border-color:var(--color-primary-dark);
  color:#ffffff;
  box-shadow:0 4px 10px rgba(0,0,0,0.24);
}

#listTitle {
  width:100%;
  max-width:var(--content-max-width);
  box-sizing:border-box;
  margin:18px auto 8px;
  padding:10px 14px;
  border-radius:8px;
  background:var(--color-header);
  color:#ffffff;
  font-size:16px;
  font-weight:800;
  text-transform:uppercase;
}

table {
  border-collapse:separate;
  border-spacing:0;
  width:100%;
  max-width:var(--content-max-width);
  margin:0 auto;
  background:#ffffff;
  border:1px solid var(--color-border);
  border-radius:10px;
  overflow:hidden;
  font-size:13px;
  box-sizing:border-box;
}

td, th {
  border:0;
  border-bottom:1px solid rgba(44,62,85,0.12);
  padding:7px 10px;
  text-align:left;
  vertical-align:top;
  line-height:1.25;
}

th {
  color:#ffffff;
  background:var(--color-header);
  font-weight:bold;
  text-transform:uppercase;
  font-size:13px;
}

tbody tr:nth-child(even) {
  background:#f9fbfd;
}

tbody tr:last-child td {
  border-bottom:0;
}

tbody tr:hover {
  background:#f0f8fb;
}

.col-name {
  width:34%;
}

.col-city {
  width:22%;
}

.col-caretaker {
  width:24%;
}

.school-title {
  color:var(--color-header);
  font-weight:800;
}

.school-meta {
  margin-top:2px;
  color:#5b6b7c;
  font-size:12px;
}

.group-header-row td {
  padding:10px 12px;
  background:var(--color-header);
  color:#ffffff;
  font-size:14px;
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:0.2px;
}

.group-header-subtitle {
  margin-left:8px;
  color:#d8e8f0;
  font-size:12px;
  font-weight:700;
  text-transform:none;
}

.assignment-row {
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
}

.assignment-select {
  min-width:220px;
  width:100%;
  max-width:300px;
}

.assigned-badge {
  display:inline-flex;
  align-items:center;
  min-height:28px;
  padding:0 10px;
  border:1px solid var(--color-border);
  border-radius:999px;
  background:#eef6fb;
  color:var(--color-header);
  font-weight:800;
}

.empty-state-cell {
  padding:16px 10px;
  color:var(--color-header);
  font-weight:700;
  text-align:center;
  background:#f8fbfd;
}
</style>
</head>

<body>

<div class="page-header">
<div class="top-toolbar">
  <div class="top-toolbar-left">
    <a href="home.html">Domů</a>
    <a href="index.html">Zpět na rozvrh</a>
  </div>
  <div class="top-toolbar-actions"></div>
  <div class="top-toolbar-modules">
    <a href="index.html">Rozvrh</a>
    <a href="schools.html">Školy</a>
    <a href="caretakers.html">Školníci</a>
    <a href="trainers.html">Trenéři</a>
    <a class="active" href="managers.html">Manažeři</a>
    <a href="vykazy.html">Výkazy</a>
  </div>
</div>
<h2 id="pageTitle">Manažeři</h2>
</div>

<main class="manager-shell">
<div class="manager-info-panel">
  <div>
    <h3 class="manager-info-title">Přiřazení škol školníkům</h3>
    <p class="manager-info-text">Nejprve jsou školy bez školníka, potom školy seskupené podle školníků abecedně podle příjmení.</p>
  </div>
  <div class="manager-tools">
    <input id="schoolSearch" placeholder="Hledat školu nebo město">
    <select id="caretakerFilter">
      <option value="">Všichni školníci</option>
    </select>
  </div>
</div>

<h3 id="listTitle">Školy</h3>
<table>
  <thead>
    <tr>
      <th>#</th>
      <th class="col-name">Škola</th>
      <th class="col-city">Město</th>
      <th class="col-caretaker">Aktuální školník</th>
      <th>Přiřadit</th>
    </tr>
  </thead>
  <tbody id="list"></tbody>
</table>
</main>

<script>
const schoolSearch = document.getElementById("schoolSearch");
const caretakerFilter = document.getElementById("caretakerFilter");
const list = document.getElementById("list");

function loadSchools(){
  try {
    return (JSON.parse(localStorage.getItem("schools")) || []).map((school) => ({
      ...school,
      assignedTrainerId: school.assignedTrainerId ?? null,
      assignedCaretakerId: school.assignedCaretakerId || ""
    }));
  } catch {
    return [];
  }
}

function saveSchools(schools){
  localStorage.setItem("schools", JSON.stringify(schools));
}

function loadCaretakers(){
  try {
    return JSON.parse(localStorage.getItem("caretakers") || "[]");
  } catch {
    return [];
  }
}

function getCaretakerName(caretakerId, caretakers){
  if(!caretakerId) return "Bez školníka";
  const caretaker = caretakers.find((item) => String(item.id) === String(caretakerId));
  if(!caretaker) return "Bez školníka";
  const fullName = `${caretaker.prijmeni || ""} ${caretaker.jmeno || ""}`.trim();
  return fullName || caretaker.name || "Bez školníka";
}

function sortByName(items){
  return items.slice().sort((a, b) => {
    const aName = `${a.prijmeni || ""} ${a.jmeno || ""} ${a.name || ""}`.trim();
    const bName = `${b.prijmeni || ""} ${b.jmeno || ""} ${b.name || ""}`.trim();
    return aName.localeCompare(bName, "cs");
  });
}

function renderCaretakerFilter(caretakers){
  const currentValue = caretakerFilter.value;
  const fragment = document.createDocumentFragment();

  const allOption = document.createElement("option");
  allOption.value = "";
  allOption.textContent = "Všichni školníci";
  fragment.appendChild(allOption);

  const withoutOption = document.createElement("option");
  withoutOption.value = "__none__";
  withoutOption.textContent = "Bez školníka";
  fragment.appendChild(withoutOption);

  sortByName(caretakers).forEach((caretaker) => {
    const option = document.createElement("option");
    option.value = caretaker.id;
    option.textContent = getCaretakerName(caretaker.id, caretakers);
    fragment.appendChild(option);
  });

  caretakerFilter.replaceChildren(fragment);
  caretakerFilter.value = [...caretakerFilter.options].some(option => option.value === currentValue)
    ? currentValue
    : "";
}

function assignCaretakerToSchool(schoolId, caretakerId){
  const schools = loadSchools()
    .map((school) => String(school.id) === String(schoolId)
      ? { ...school, assignedCaretakerId: caretakerId || "" }
      : school
    );

  saveSchools(schools);
}

function getVisibleSchools(schools){
  const query = schoolSearch.value.trim().toLowerCase();
  const filterValue = caretakerFilter.value;

  return schools
    .filter((school) => {
      if(!query) return true;
      return `${school.nazev || ""} ${school.mesto || ""} ${school.ulice || ""}`.toLowerCase().includes(query);
    })
    .filter((school) => {
      if(!filterValue) return true;
      if(filterValue === "__none__") return !school.assignedCaretakerId;
      return String(school.assignedCaretakerId || "") === String(filterValue);
    })
    .sort(compareSchools);
}

function compareSchools(a, b){
  const nameCompare = (a.nazev || "").localeCompare(b.nazev || "", "cs");
  if(nameCompare) return nameCompare;
  return (a.mesto || "").localeCompare(b.mesto || "", "cs");
}

function createGroupHeader(title, count){
  const row = document.createElement("tr");
  row.className = "group-header-row";

  const cell = document.createElement("td");
  cell.colSpan = 5;
  cell.textContent = title;

  const subtitle = document.createElement("span");
  subtitle.className = "group-header-subtitle";
  subtitle.textContent = `(${count})`;
  cell.appendChild(subtitle);

  row.appendChild(cell);
  return row;
}

function createSchoolRow(school, index, caretakers){
  const row = document.createElement("tr");

  const orderCell = document.createElement("td");
  orderCell.textContent = index;
  row.appendChild(orderCell);

  const nameCell = document.createElement("td");
  const schoolTitle = document.createElement("div");
  schoolTitle.className = "school-title";
  schoolTitle.textContent = school.nazev || "-";
  nameCell.appendChild(schoolTitle);

  const schoolMeta = document.createElement("div");
  schoolMeta.className = "school-meta";
  schoolMeta.textContent = [school.ulice, school.psc].filter(Boolean).join(", ");
  if(schoolMeta.textContent) nameCell.appendChild(schoolMeta);
  row.appendChild(nameCell);

  const cityCell = document.createElement("td");
  cityCell.textContent = school.mesto || "-";
  row.appendChild(cityCell);

  const currentCell = document.createElement("td");
  const assignedBadge = document.createElement("span");
  assignedBadge.className = "assigned-badge";
  assignedBadge.textContent = getCaretakerName(school.assignedCaretakerId, caretakers);
  currentCell.appendChild(assignedBadge);
  row.appendChild(currentCell);

  const assignmentCell = document.createElement("td");
  const assignmentRow = document.createElement("div");
  assignmentRow.className = "assignment-row";

  const select = document.createElement("select");
  select.className = "assignment-select";

  const emptyOption = document.createElement("option");
  emptyOption.value = "";
  emptyOption.textContent = "Bez školníka";
  select.appendChild(emptyOption);

  sortByName(caretakers).forEach((caretaker) => {
    const option = document.createElement("option");
    option.value = caretaker.id;
    option.textContent = getCaretakerName(caretaker.id, caretakers);
    option.selected = String(school.assignedCaretakerId || "") === String(caretaker.id);
    select.appendChild(option);
  });

  const saveButton = document.createElement("button");
  saveButton.type = "button";
  saveButton.textContent = "Uložit";
  saveButton.addEventListener("click", () => {
    assignCaretakerToSchool(school.id, select.value);
    render();
  });

  assignmentRow.appendChild(select);
  assignmentRow.appendChild(saveButton);
  assignmentCell.appendChild(assignmentRow);
  row.appendChild(assignmentCell);

  return row;
}

function buildGroups(visibleSchools, caretakers){
  const groups = [];

  const unassignedSchools = visibleSchools
    .filter((school) => !school.assignedCaretakerId)
    .sort(compareSchools);

  if(unassignedSchools.length){
    groups.push({
      title: "Bez přiřazeného školníka",
      schools: unassignedSchools
    });
  }

  sortByName(caretakers).forEach((caretaker) => {
    const assignedSchools = visibleSchools
      .filter((school) => String(school.assignedCaretakerId || "") === String(caretaker.id))
      .sort(compareSchools);

    if(assignedSchools.length){
      groups.push({
        title: getCaretakerName(caretaker.id, caretakers),
        schools: assignedSchools
      });
    }
  });

  return groups;
}

function render(){
  const schools = loadSchools();
  const caretakers = loadCaretakers();
  const visibleSchools = getVisibleSchools(schools);

  const fragment = document.createDocumentFragment();

  if(!visibleSchools.length){
    const row = document.createElement("tr");
    const cell = document.createElement("td");
    cell.className = "empty-state-cell";
    cell.colSpan = 5;
    cell.textContent = schools.length ? "Žádná škola neodpovídá filtru." : "Zatím nejsou založené žádné školy.";
    row.appendChild(cell);
    fragment.appendChild(row);
    list.replaceChildren(fragment);
    return;
  }

  let order = 1;
  buildGroups(visibleSchools, caretakers).forEach((group) => {
    fragment.appendChild(createGroupHeader(group.title, group.schools.length));

    group.schools.forEach((school) => {
      fragment.appendChild(createSchoolRow(school, order, caretakers));
      order += 1;
    });
  });

  list.replaceChildren(fragment);
}

function init(){
  const caretakers = loadCaretakers();
  renderCaretakerFilter(caretakers);
  render();
}

schoolSearch.addEventListener("input", render);
caretakerFilter.addEventListener("change", render);

init();
</script>

</body>
</html>
