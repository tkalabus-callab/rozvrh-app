<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Školníci</title>
<link rel="stylesheet" href="styles.css">

<style>

body {
  display:flex;
  flex-direction:column;
  font-family: Arial;
  padding:20px;
  background:var(--color-bg);
  color:var(--color-text);
}

body > h2 {
  order:1;
  margin:0;
  padding:16px;
  background:var(--color-header) !important;
  color:#ffffff;
  text-align:center;
  text-transform:uppercase;
  letter-spacing:1px;
  font-size:30px;
  font-weight:900;
  text-shadow:0 2px 4px rgba(0,0,0,0.35);
  border-bottom:5px solid var(--color-primary);
  box-shadow:0 4px 14px rgba(0,0,0,0.18);
  box-sizing:border-box;
  width:100%;
}

body.manager-mode > h2 {
  background:#7f1d1d !important;
  color:#ffffff;
  border:0;
  border-bottom:5px solid var(--color-primary);
  box-shadow:0 4px 14px rgba(0,0,0,0.18);
  font-size:30px;
  font-weight:900;
  letter-spacing:1px;
  text-shadow:0 2px 4px rgba(0,0,0,0.35);
}

.caretaker-form-panel {
  order:4;
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  gap:10px 12px;
  width:100%;
  max-width:var(--content-max-width);
  margin:18px auto 16px;
  padding:18px 18px 16px;
  border:1px solid var(--color-border);
  border-radius:14px;
  background:#fff;
  box-shadow:0 6px 18px rgba(44,62,85,0.08);
  box-sizing:border-box;
}

#caretakerEditPanel[hidden] {
  display:none !important;
}

.caretaker-form-panel.is-new {
  border-color:var(--color-primary);
  box-shadow:0 0 0 3px rgba(27,179,200,0.12);
}

.caretaker-form-panel.is-edit {
  border-color:var(--color-header);
  box-shadow:0 0 0 3px rgba(44,62,85,0.12);
}

.caretaker-form-panel.is-opening {
  border-color:var(--color-primary);
  box-shadow:0 0 0 3px rgba(27,179,200,0.22);
}

.caretaker-form-panel > br {
  display:none;
}

.caretaker-form-panel input,
.caretaker-form-panel select {
  flex:1 1 180px;
  max-width:220px;
  margin:0;
  min-height:40px;
}

.caretaker-form-panel input,
.caretaker-form-panel select,
.caretaker-form-panel textarea,
.caretaker-form-panel button {
  font-size:15px;
}

.caretaker-form-panel input[type="color"] {
  flex:0 0 54px;
}

.caretaker-form-panel textarea {
  flex:1 1 100%;
  width:100%;
  max-width:760px;
  margin:0;
  min-height:92px;
  resize:vertical;
}

.caretaker-form-panel .buttons {
  flex:1 1 100%;
  margin:14px 0 0;
  padding-top:12px;
  border-top:1px solid var(--color-border);
  gap:10px;
  flex-wrap:wrap;
}

.caretaker-form-panel .buttons button {
  min-height:38px;
  padding:0 14px;
}

.caretaker-form-panel #saveButton {
  min-width:150px;
}

#caretakerFormTitle {
  flex:1 1 100%;
  margin:0 0 10px;
  color:var(--color-header);
  font-size:22px;
  font-weight:800;
  line-height:1.2;
  text-transform:uppercase;
}

#caretakerFormTitle.is-new {
  color:var(--color-primary-dark);
}

#caretakerFormTitle.is-edit {
  color:var(--color-header);
}

.page-action-box {
  order:3;
  margin:16px auto;
  padding:16px 18px;
  max-width:var(--content-max-width);
  width:100%;
  border:0;
  border-radius:12px;
  background:var(--color-primary);
  box-sizing:border-box;
  display:flex;
  align-items:center;
  justify-content:flex-start;
  gap:14px;
  flex-wrap:wrap;
}

.page-action-box::before {
  content:"ZOBRAZENÍ";
  color:#000000;
  font-weight:800;
  text-transform:uppercase;
  font-size:14px;
  line-height:1.2;
  width:100%;
}

#newCaretakerButton {
  border:0;
  background:var(--color-header);
  color:#ffffff;
  box-shadow:0 4px 10px rgba(0,0,0,0.25);
  min-height:40px;
  line-height:1;
  padding:0 18px;
  font-weight:800;
  text-transform:uppercase;
}

#newCaretakerButton:hover,
#newCaretakerButton:focus {
  background:#146f80;
  box-shadow:0 6px 14px rgba(0,0,0,0.3);
}

input,
select {
  margin:4px 6px 4px 0;
  width:180px;
  height:34px;
  padding:6px 8px;
  border:1px solid #d4dde6;
  border-radius:6px;
  box-sizing:border-box;
  color:#24364b;
  background:#ffffff;
}

input:focus,
select:focus,
textarea:focus {
  outline:2px solid var(--color-primary);
  outline-offset:1px;
  border-color:var(--color-primary);
}

input[type="color"] {
  width:54px;
  padding:3px;
  vertical-align:middle;
}

label {
  margin-right:6px;
  color:var(--color-header);
  font-weight:700;
}

textarea {
  display:block;
  margin:8px 0 0;
  width:370px;
  height:70px;
  padding:6px 8px;
  border:1px solid #d4dde6;
  border-radius:6px;
  box-sizing:border-box;
  font-family: Arial;
  color:#24364b;
  background:#ffffff;
}

table {
  order:6;
  border-collapse: separate;
  border-spacing:0;
  margin:0 auto;
  width:100%;
  max-width:var(--content-max-width);
  background:#ffffff;
  border:1px solid #d4dde6;
  border-radius:10px;
  overflow:hidden;
  font-size:13px;
  box-sizing:border-box;
}

body > h3 {
  order:5;
  width:100%;
  max-width:var(--content-max-width);
  box-sizing:border-box;
  background:var(--color-header);
  color:#ffffff;
  font-weight:700;
  padding:10px 14px;
  border-radius:8px;
  margin:18px auto 8px;
  text-transform:uppercase;
}

td, th {
  border:0;
  border-bottom:1px solid rgba(44,62,85,0.12);
  padding:6px 8px;
  text-align:left;
  line-height:1.25;
}

th {
  color:#ffffff;
  background:var(--color-header);
  font-weight:bold;
  text-transform:uppercase;
  font-size:13px;
  line-height:1.2;
}

tbody tr:nth-child(even) {
  background:#f9fbfd;
}

tbody tr:last-child td {
  border-bottom:0;
}

tr.active {
  background:#eef6fb !important;
  color:var(--color-header);
  font-weight:700;
  box-shadow:inset 0 0 0 1px var(--color-primary);
}

tr:hover {
  background:#f0f8fb !important;
  cursor:pointer;
}

tr.active:hover {
  background:#e6f4f8 !important;
}

.assigned-schools-detail td {
  padding:8px 12px;
  font-size:12px;
  background:#f4f8fb;
  border-top:1px solid var(--color-border);
}

.assigned-schools-detail ul {
  margin:0;
  padding-left:18px;
}

.assigned-schools-detail li {
  margin:3px 0;
  line-height:1.35;
}

.assigned-schools-empty {
  font-style:italic;
  color:#6c7a89;
  padding:4px 0;
}

.manager-group-row td {
  padding:10px 12px;
  background:var(--color-header);
  color:#ffffff;
  font-size:14px;
  font-weight:800;
  text-transform:uppercase;
}

.manager-school-title {
  color:var(--color-header);
  font-weight:800;
}

.manager-school-meta {
  margin-top:2px;
  color:#5b6b7c;
  font-size:12px;
}

.manager-assignment-row {
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
}

.manager-assignment-row select {
  width:240px;
  max-width:100%;
}

.manager-mode-info {
  order:3;
  width:100%;
  max-width:var(--content-max-width);
  margin:16px auto 0;
  padding:14px 16px;
  border:2px solid #7f1d1d;
  border-radius:10px;
  background:#fff7ed;
  color:#451a03;
  box-sizing:border-box;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  flex-wrap:wrap;
}

.manager-mode-info[hidden] {
  display:none;
}

.manager-mode-info strong {
  display:block;
  margin-bottom:3px;
  color:#7f1d1d;
  text-transform:uppercase;
}

#exitManagerModeButton {
  min-height:38px;
  padding:0 14px;
  border:1px solid #7f1d1d;
  border-radius:8px;
  background:#7f1d1d;
  color:#ffffff;
  font-weight:800;
  cursor:pointer;
}

#exitManagerModeButton:hover,
#exitManagerModeButton:focus {
  background:#991b1b;
  border-color:#991b1b;
}

.assigned-schools-toggle-active {
  border-color:var(--color-header);
  background:var(--color-header);
  color:#ffffff;
  font-weight:800;
}

.profile-toggle-active {
  border-color:var(--color-header);
  background:var(--color-header);
  color:#ffffff;
  font-weight:800;
}

.caretaker-color-cell {
  width:44px;
  text-align:center;
}

.caretaker-color-dot {
  display:inline-block;
  width:14px;
  height:14px;
  border:1px solid rgba(44,62,85,0.25);
  border-radius:50%;
  vertical-align:middle;
}

.caretaker-count-cell {
  text-align:center;
}

.caretakers-table.is-disabled {
  opacity:0.45;
  pointer-events:none;
  transition:opacity 0.2s ease;
}

.danger-confirm {
  background:#c62828 !important;
  color:#fff !important;
  border-color:#8e1d1d !important;
}

.buttons {
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
  margin:12px 0 16px;
  padding-top:12px;
  border-top:1px solid #d4dde6;
}

.buttons button,
.buttons a {
  min-height:34px;
  margin:0;
  padding:0 12px;
  border:1px solid #d4dde6;
  border-radius:8px;
  background:#ffffff;
  color:var(--color-header);
  font-weight:700;
  line-height:1;
  cursor:pointer;
  transition:background 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
}

.buttons button:hover,
.buttons a:hover {
  border-color:var(--color-primary);
  background:#eef6fb;
}

#saveButton {
  border:0;
  background:var(--color-header);
  color:#ffffff;
  box-shadow:0 4px 10px rgba(0,0,0,0.25);
  padding:0 18px;
  text-transform:uppercase;
}

#saveButton:hover,
#saveButton:focus {
  background:#146f80;
  box-shadow:0 6px 14px rgba(0,0,0,0.3);
}

#deleteButton {
  color:#c00;
}

.top-toolbar {
  order:2;
  background:var(--color-header);
  margin-bottom:16px;
}
</style>
</head>

<body>
<script>
(function(){
  const managerLoggedIn = sessionStorage.getItem("managerModeUnlocked") === "1";
  const caretakerId = localStorage.getItem("caretakerId") || "";
  const sessionCaretakerId = sessionStorage.getItem("caretakerModeUnlocked") || "";
  let caretakers = [];
  try { caretakers = JSON.parse(localStorage.getItem("caretakers") || "[]"); } catch {}
  const caretakerLoggedIn = Boolean(
    caretakerId &&
    sessionCaretakerId &&
    String(caretakerId) === String(sessionCaretakerId) &&
    caretakers.some(item => String(item.id) === String(caretakerId))
  );
  if(!managerLoggedIn && !caretakerLoggedIn){
    window.location.replace("home.html");
  }
})();
</script>

<h2 id="pageTitle">Školníci</h2>
<div class="top-toolbar">
  <div class="top-toolbar-left">
    <a href="home.html">Domů</a>
    <a href="index.html">Zpět na rozvrh</a>
    <a href="schools.html">Školy</a>
  </div>
  <div class="top-toolbar-actions"></div>
  <div class="top-toolbar-modules">
  </div>
</div>

<div id="caretakerEditPanel" class="caretaker-form-panel" hidden>
<h3 id="caretakerFormTitle">Nový školník</h3>
<input id="prijmeni" placeholder="Příjmení">
<input id="jmeno" placeholder="Jméno">
<br>
<input id="telefon" placeholder="Telefon">
<input id="email" placeholder="Email">
<label for="barva">Vyber barvu školníkovi</label>
<br>
<input id="barva" type="color" value="#d9ead3">
<br>
<div id="caretakerAssignedSchools" class="caretaker-assigned-schools" hidden></div>

<div class="buttons">
  <button id="saveButton">Přidat / Uložit</button>
  <button id="newButton">Nový</button>
  <button id="deleteButton">Smazat</button>
  <button id="openSchoolsButton">Zobrazit školy</button>
  <button id="clearCaretakerRoleButton">Zrušit režim školníka</button>
</div>
</div>

<div class="page-action-box">
  <button id="newCaretakerButton" class="view-option-button" type="button">+ Nový školník</button>
  <button id="allCaretakersViewButton" class="view-option-button is-active" type="button">Všichni školníci</button>
  <button id="expandedCaretakersViewButton" class="view-option-button" type="button">Školníci + přidělené školy</button>
</div>

<div id="managerModeInfo" class="manager-mode-info" hidden>
  <div>
    <strong>Režim manažer</strong>
    Přiřazuješ školy školníkům. Změny se projeví na stránce Školy i v rozvrhu.
  </div>
  <button id="exitManagerModeButton" type="button">Ukončit režim manažera</button>
</div>

<h3>Seznam</h3>
<table class="caretakers-table">
  <thead>
    <tr>
      <th>#</th>
      <th>Školník</th>
      <th>Barva</th>
      <th>Počet škol</th>
      <th>Zobrazit přidělené školy</th>
      <th>Použít jako profil</th>
      <th>Upravit</th>
    </tr>
  </thead>
  <tbody id="list"></tbody>
</table>

<script>
const STORAGE_KEY = "caretakers";
const CARETAKER_ROLE_STORAGE_KEY = "caretakerId";
const MANAGER_SESSION_KEY = "managerModeUnlocked";
const MANAGER_RETURN_KEY = "managerModeReturnTo";

const jmeno = document.getElementById("jmeno");
const pageTitle = document.getElementById("pageTitle");
const prijmeni = document.getElementById("prijmeni");
const telefon = document.getElementById("telefon");
const email = document.getElementById("email");
const barva = document.getElementById("barva");
const caretakerAssignedSchools = document.getElementById("caretakerAssignedSchools");
const caretakerFormTitle = document.getElementById("caretakerFormTitle");
const caretakerEditPanel = document.getElementById("caretakerEditPanel");
const caretakersTable = document.querySelector(".caretakers-table");
const saveButton = document.getElementById("saveButton");
const newButton = document.getElementById("newButton");
const newCaretakerButton = document.getElementById("newCaretakerButton");
const allCaretakersViewButton = document.getElementById("allCaretakersViewButton");
const expandedCaretakersViewButton = document.getElementById("expandedCaretakersViewButton");
const managerModeInfo = document.getElementById("managerModeInfo");
const exitManagerModeButton = document.getElementById("exitManagerModeButton");
const deleteButton = document.getElementById("deleteButton");
const openSchoolsButton = document.getElementById("openSchoolsButton");
const clearCaretakerRoleButton = document.getElementById("clearCaretakerRoleButton");
const list = document.getElementById("list");

let caretakers = loadCaretakers();
let editId = null;
let selectedId = null;
let expandedCaretakerId = null;
let caretakerViewMode = "default";
let pendingDeleteCaretakerId = null;

function loadCaretakers(){
  try {
    const items = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
    if(!Array.isArray(items)) return [];

    return items.map(item => ({
      id: String(item.id || ""),
      jmeno: item.jmeno || "",
      prijmeni: item.prijmeni || "",
      telefon: item.telefon || "",
      email: item.email || "",
      color: item.color || "#d9ead3",
      defaultSchoolId: item.defaultSchoolId || "",
      poznamka: item.poznamka || ""
    })).filter(item => item.id);
  } catch {
    return [];
  }
}

function loadSchools(){
  try {
    return JSON.parse(localStorage.getItem("schools") || "[]");
  } catch {
    return [];
  }
}

function saveSchools(schools){
  localStorage.setItem("schools", JSON.stringify(schools));
}

function saveCaretakers(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(caretakers));
}

function sortCaretakers(items){
  return items.slice().sort((a, b) => {
    const surnameCompare = (a.prijmeni || "").localeCompare(b.prijmeni || "", "cs");
    if(surnameCompare !== 0) return surnameCompare;
    return (a.jmeno || "").localeCompare(b.jmeno || "", "cs");
  });
}

function getDisplayName(caretaker){
  const fullName = `${caretaker.prijmeni || ""} ${caretaker.jmeno || ""}`.trim();
  return fullName || "-";
}

function getDisplayValue(value){
  return value || "-";
}

function getListText(caretaker){
  return `${getDisplayName(caretaker)} - ${getDisplayValue(caretaker.telefon)} - ${getDisplayValue(caretaker.email)}`;
}

function getAssignedSchoolCount(caretakerId){
  const schools = loadSchools();
  return schools.filter(s => String(s.assignedCaretakerId || "") === String(caretakerId)).length;
}

function getAssignedSchools(caretakerId){
  return loadSchools()
    .filter(s => String(s.assignedCaretakerId || "") === String(caretakerId))
    .sort((a, b) => safeName(a).localeCompare(safeName(b), "cs"));
}

function hasAssignedSchools(caretakerId){
  const schools = loadSchools();
  return schools.some(s => String(s.assignedCaretakerId || "") === String(caretakerId));
}

function safeName(school){
  return school?.nazev || "-";
}

function renderAssignedSchools(caretakerId){
  const schools = loadSchools().filter(
    s => String(s.assignedCaretakerId || "") === String(caretakerId)
  );

  caretakerAssignedSchools.innerHTML = "";

  const title = document.createElement("div");
  title.textContent = "Přidělené školy:";
  title.style.fontWeight = "700";
  title.style.margin = "6px 0";
  caretakerAssignedSchools.appendChild(title);

  if(!schools.length){
    const empty = document.createElement("div");
    empty.textContent = "— žádné školy —";
    caretakerAssignedSchools.appendChild(empty);
    return;
  }

  schools.forEach(s => {
    const item = document.createElement("div");
    item.textContent = "• " + safeName(s);
    caretakerAssignedSchools.appendChild(item);
  });
}

function getActiveCaretakerRoleId(){
  return localStorage.getItem(CARETAKER_ROLE_STORAGE_KEY) || "";
}

function setActiveCaretakerRoleId(caretakerId){
  localStorage.setItem(CARETAKER_ROLE_STORAGE_KEY, String(caretakerId || ""));
  window.location.href = "index.html";
}

function clearActiveCaretakerRoleId(){
  localStorage.removeItem(CARETAKER_ROLE_STORAGE_KEY);
}

function isActiveCaretakerRole(caretakerId){
  return String(getActiveCaretakerRoleId()) === String(caretakerId || "");
}

function openCaretakerEditPanel(){
  caretakerEditPanel.hidden = false;
  caretakerEditPanel.classList.remove("is-opening");
  void caretakerEditPanel.offsetWidth;
  caretakerEditPanel.classList.add("is-opening");
  caretakerEditPanel.scrollIntoView({ behavior:"smooth", block:"start" });
  setTimeout(() => caretakerEditPanel.classList.remove("is-opening"), 1600);
  caretakersTable.classList.add("is-disabled");
  setTimeout(() => caretakersTable.classList.remove("is-disabled"), 1600);
}

function closeCaretakerEditPanel(){
  caretakerEditPanel.hidden = true;
}

function setCaretakerEditPanelMode(mode){
  caretakerEditPanel.classList.remove("is-new", "is-edit");
  caretakerFormTitle.classList.remove("is-new", "is-edit");
  caretakerEditPanel.classList.add(mode === "edit" ? "is-edit" : "is-new");
  caretakerFormTitle.classList.add(mode === "edit" ? "is-edit" : "is-new");
}

function resetDeleteConfirmation(){
  pendingDeleteCaretakerId = null;
  deleteButton.textContent = "Smazat";
  deleteButton.classList.remove("danger-confirm");
}

function clearForm(){
  jmeno.value = "";
  prijmeni.value = "";
  telefon.value = "";
  email.value = "";
  barva.value = "#d9ead3";
  caretakerAssignedSchools.hidden = true;
  caretakerFormTitle.textContent = "Nový školník";
  saveButton.textContent = "Uložit školníka";
  setCaretakerEditPanelMode("new");
  resetDeleteConfirmation();
  editId = null;
  selectedId = null;
  render();
}

function loadToForm(id){
  const caretaker = caretakers.find(item => item.id === id);
  if(!caretaker) return;

  openCaretakerEditPanel();
  jmeno.value = caretaker.jmeno || "";
  prijmeni.value = caretaker.prijmeni || "";
  telefon.value = caretaker.telefon || "";
  email.value = caretaker.email || "";
  barva.value = caretaker.color || "#d9ead3";
  renderAssignedSchools(caretaker.id);
  caretakerAssignedSchools.hidden = false;
  caretakerFormTitle.textContent = "Upravit školníka";
  saveButton.textContent = "Uložit změny";
  setCaretakerEditPanelMode("edit");
  resetDeleteConfirmation();

  editId = caretaker.id;
  selectedId = caretaker.id;
  jmeno.focus();
  render();
}

function saveCurrent(){
  const isEmptyNewCaretaker =
    editId === null &&
    !jmeno.value.trim() &&
    !prijmeni.value.trim() &&
    !telefon.value.trim() &&
    !email.value.trim() &&
    (!barva.value || barva.value === "#d9ead3");

  if(isEmptyNewCaretaker){
    editId = null;
    selectedId = null;
    closeCaretakerEditPanel();
    render();
    return;
  }

  const caretakerId = String(editId || Date.now().toString());
  const existingCaretaker = caretakers.find(item => String(item.id) === String(caretakerId));
  const caretaker = {
    id: caretakerId,
    jmeno: jmeno.value.trim(),
    prijmeni: prijmeni.value.trim(),
    telefon: telefon.value.trim(),
    email: email.value.trim(),
    color: barva.value || "#d9ead3",
    defaultSchoolId: existingCaretaker?.defaultSchoolId || "",
    poznamka: existingCaretaker?.poznamka || ""
  };

  if(editId){
    caretakers = caretakers.map(item => item.id === editId ? caretaker : item);
  } else {
    caretakers.push(caretaker);
  }

  saveCaretakers();
  editId = null;
  selectedId = null;
  caretakerFormTitle.textContent = "Nový školník";
  saveButton.textContent = "Uložit školníka";
  closeCaretakerEditPanel();
  render();
}

function removeCurrent(){
  if(!editId) return;
  if (hasAssignedSchools(editId)) {
    alert("Tento školník má přiřazené školy. Nejprve změň přiřazeného školníka u těchto škol v databázi škol.");
    return;
  }
  if(pendingDeleteCaretakerId !== editId){
    pendingDeleteCaretakerId = editId;
    deleteButton.textContent = "Opravdu smazat?";
    deleteButton.classList.add("danger-confirm");
    return;
  }

  caretakers = caretakers.filter(item => item.id !== editId);
  saveCaretakers();
  resetDeleteConfirmation();
  clearForm();
  closeCaretakerEditPanel();
  render();
}

function openSchoolsForCaretaker(){
  if(!editId) return;
  localStorage.setItem("schoolsCaretakerFilter", editId);
  window.location.href = "schools.html";
}

function isCaretakerExpanded(caretakerId){
  return caretakerViewMode === "expanded" || String(expandedCaretakerId || "") === String(caretakerId);
}

function syncCaretakerViewButtons(){
  allCaretakersViewButton.classList.toggle("is-active", caretakerViewMode === "default");
  expandedCaretakersViewButton.classList.toggle("is-active", caretakerViewMode === "expanded");
  newCaretakerButton.hidden = caretakerViewMode === "manager";
  managerModeInfo.hidden = caretakerViewMode !== "manager";
  document.body.classList.toggle("manager-mode", caretakerViewMode === "manager");
  pageTitle.textContent = caretakerViewMode === "manager" ? "REŽIM MANAŽER" : "Školníci";
}

function setDefaultTableHead(){
  caretakersTable.querySelector("thead").innerHTML = `
    <tr>
      <th>#</th>
      <th>Školník</th>
      <th>Barva</th>
      <th>Počet škol</th>
      <th>Zobrazit přidělené školy</th>
      <th>Použít jako profil</th>
      <th>Upravit</th>
    </tr>
  `;
}

function setManagerTableHead(){
  caretakersTable.querySelector("thead").innerHTML = `
    <tr>
      <th>#</th>
      <th>Škola</th>
      <th>Město</th>
      <th>Aktuální školník</th>
      <th>Přiřadit školníka</th>
    </tr>
  `;
}

function compareSchools(a, b){
  const nameCompare = (a.nazev || "").localeCompare(b.nazev || "", "cs");
  if(nameCompare) return nameCompare;
  return (a.mesto || "").localeCompare(b.mesto || "", "cs");
}

function assignCaretakerToSchool(schoolId, caretakerId){
  const schools = loadSchools().map((school) => String(school.id) === String(schoolId)
    ? { ...school, assignedCaretakerId: caretakerId || "" }
    : school
  );
  saveSchools(schools);
}

function createManagerGroupRow(title, count){
  const row = document.createElement("tr");
  row.className = "manager-group-row";
  const cell = document.createElement("td");
  cell.colSpan = 5;
  cell.textContent = `${title} (${count})`;
  row.appendChild(cell);
  return row;
}

function createManagerSchoolRow(school, order){
  const row = document.createElement("tr");

  const orderCell = document.createElement("td");
  orderCell.textContent = order;
  row.appendChild(orderCell);

  const nameCell = document.createElement("td");
  const title = document.createElement("div");
  title.className = "manager-school-title";
  title.textContent = school.nazev || "-";
  nameCell.appendChild(title);
  const meta = document.createElement("div");
  meta.className = "manager-school-meta";
  meta.textContent = [school.ulice, school.psc].filter(Boolean).join(", ");
  if(meta.textContent) nameCell.appendChild(meta);
  row.appendChild(nameCell);

  const cityCell = document.createElement("td");
  cityCell.textContent = school.mesto || "-";
  row.appendChild(cityCell);

  const currentCell = document.createElement("td");
  currentCell.textContent = getCaretakerNameById(school.assignedCaretakerId);
  row.appendChild(currentCell);

  const assignmentCell = document.createElement("td");
  const assignmentRow = document.createElement("div");
  assignmentRow.className = "manager-assignment-row";

  const select = document.createElement("select");
  const emptyOption = document.createElement("option");
  emptyOption.value = "";
  emptyOption.textContent = "Bez školníka";
  select.appendChild(emptyOption);

  sortCaretakers(caretakers).forEach((caretaker) => {
    const option = document.createElement("option");
    option.value = caretaker.id;
    option.textContent = getDisplayName(caretaker);
    option.selected = String(school.assignedCaretakerId || "") === String(caretaker.id);
    select.appendChild(option);
  });

  const saveButton = document.createElement("button");
  saveButton.type = "button";
  saveButton.textContent = "Uložit";
  saveButton.addEventListener("click", () => {
    assignCaretakerToSchool(school.id, select.value);
    render();
  });

  assignmentRow.appendChild(select);
  assignmentRow.appendChild(saveButton);
  assignmentCell.appendChild(assignmentRow);
  row.appendChild(assignmentCell);

  return row;
}

function getCaretakerNameById(caretakerId){
  if(!caretakerId) return "Bez školníka";
  const caretaker = caretakers.find(item => String(item.id) === String(caretakerId));
  return caretaker ? getDisplayName(caretaker) : "Bez školníka";
}

function renderManagerView(){
  setManagerTableHead();
  closeCaretakerEditPanel();
  caretakerAssignedSchools.hidden = true;

  const fragment = document.createDocumentFragment();
  const schools = loadSchools();

  if(!schools.length){
    const row = document.createElement("tr");
    const cell = document.createElement("td");
    cell.colSpan = 5;
    cell.className = "assigned-schools-empty";
    cell.textContent = "Zatím nejsou založené žádné školy.";
    row.appendChild(cell);
    fragment.appendChild(row);
    list.replaceChildren(fragment);
    return;
  }

  let order = 1;
  const unassigned = schools.filter(school => !school.assignedCaretakerId).sort(compareSchools);
  if(unassigned.length){
    fragment.appendChild(createManagerGroupRow("Bez přiřazeného školníka", unassigned.length));
    unassigned.forEach((school) => {
      fragment.appendChild(createManagerSchoolRow(school, order));
      order += 1;
    });
  }

  sortCaretakers(caretakers).forEach((caretaker) => {
    const assigned = schools
      .filter(school => String(school.assignedCaretakerId || "") === String(caretaker.id))
      .sort(compareSchools);

    if(assigned.length){
      fragment.appendChild(createManagerGroupRow(getDisplayName(caretaker), assigned.length));
      assigned.forEach((school) => {
        fragment.appendChild(createManagerSchoolRow(school, order));
        order += 1;
      });
    }
  });

  list.replaceChildren(fragment);
}

async function unlockManagerMode(){
  if(sessionStorage.getItem(MANAGER_SESSION_KEY) === "1" || localStorage.getItem(MANAGER_SESSION_KEY) === "1") {
    sessionStorage.setItem(MANAGER_SESSION_KEY, "1");
    return true;
  }
  return false;
}

function render(){
  if(caretakerViewMode === "manager"){
    syncCaretakerViewButtons();
    renderManagerView();
    return;
  }

  setDefaultTableHead();
  const fragment = document.createDocumentFragment();
  const sorted = sortCaretakers(caretakers);
  syncCaretakerViewButtons();

  sorted.forEach((caretaker, index) => {
    const row = document.createElement("tr");
    if(caretaker.id === selectedId || isActiveCaretakerRole(caretaker.id)) row.className = "active";

    const orderCell = document.createElement("td");
    orderCell.textContent = index + 1;
    row.appendChild(orderCell);

    const textCell = document.createElement("td");
    textCell.textContent = getListText(caretaker);
    row.appendChild(textCell);

    const colorCell = document.createElement("td");
    colorCell.className = "caretaker-color-cell";
    if(caretaker.color){
      const colorDot = document.createElement("span");
      colorDot.className = "caretaker-color-dot";
      colorDot.style.background = caretaker.color;
      colorCell.appendChild(colorDot);
    }
    row.appendChild(colorCell);

    const countCell = document.createElement("td");
    countCell.className = "caretaker-count-cell";
    countCell.textContent = String(getAssignedSchoolCount(caretaker.id));
    row.appendChild(countCell);

    const assignedSchoolsCell = document.createElement("td");
    const assignedSchoolsButton = document.createElement("button");
    assignedSchoolsButton.type = "button";
    assignedSchoolsButton.textContent = isCaretakerExpanded(caretaker.id)
      ? "Zavřít seznam"
      : "Zobrazit přidělené školy";
    assignedSchoolsButton.classList.toggle("assigned-schools-toggle-active", isCaretakerExpanded(caretaker.id));
    assignedSchoolsButton.addEventListener("click", (event) => {
      event.stopPropagation();
      if(caretakerViewMode === "expanded"){
        caretakerViewMode = "default";
        expandedCaretakerId = null;
      } else {
        expandedCaretakerId = String(expandedCaretakerId || "") === String(caretaker.id)
          ? null
          : caretaker.id;
      }
      render();
    });
    assignedSchoolsCell.appendChild(assignedSchoolsButton);
    row.appendChild(assignedSchoolsCell);

    const profileCell = document.createElement("td");
    const profileButton = document.createElement("button");
    profileButton.textContent = isActiveCaretakerRole(caretaker.id) ? "Zrušit profil" : "Použít jako profil";
    profileButton.classList.toggle("profile-toggle-active", isActiveCaretakerRole(caretaker.id));
    profileButton.style.marginLeft = "8px";
    profileButton.addEventListener("click", (event) => {
      event.stopPropagation();
      if(isActiveCaretakerRole(caretaker.id)){
        clearActiveCaretakerRoleId();
      } else {
        setActiveCaretakerRoleId(caretaker.id);
      }
      render();
    });

    profileCell.appendChild(profileButton);
    row.appendChild(profileCell);

    const editCell = document.createElement("td");
    const editButton = document.createElement("button");
    editButton.type = "button";
    editButton.textContent = "Upravit";
    editButton.addEventListener("click", (event) => {
      event.stopPropagation();
      loadToForm(caretaker.id);
    });
    editCell.appendChild(editButton);
    row.appendChild(editCell);

    fragment.appendChild(row);

    if(isCaretakerExpanded(caretaker.id)){
      const detailRow = document.createElement("tr");
      detailRow.className = "assigned-schools-detail";
      const detailCell = document.createElement("td");
      const assignedSchools = getAssignedSchools(caretaker.id);
      detailCell.colSpan = 7;

      const count = assignedSchools.length;

      const info = document.createElement("div");
      info.style.fontWeight = "600";
      info.style.marginBottom = "4px";
      info.textContent = `Počet škol: ${count}`;
      detailCell.appendChild(info);

      if(count){
        const schoolList = document.createElement("ul");
        assignedSchools.forEach(school => {
          const item = document.createElement("li");
          item.textContent = safeName(school);
          schoolList.appendChild(item);
        });
        detailCell.appendChild(schoolList);
      } else {
        const empty = document.createElement("div");
        empty.className = "assigned-schools-empty";
        empty.textContent = "Tomuto školníkovi zatím není přiřazena žádná škola";
        detailCell.appendChild(empty);
      }

      detailRow.appendChild(detailCell);
      fragment.appendChild(detailRow);
    }
  });

  list.replaceChildren(fragment);
  if(editId === null && selectedId === null){
    closeCaretakerEditPanel();
  }
}

saveButton.addEventListener("click", saveCurrent);
newButton.addEventListener("click", clearForm);
newCaretakerButton.addEventListener("click", () => {
  clearForm();
  openCaretakerEditPanel();
  jmeno.focus();
});
allCaretakersViewButton.addEventListener("click", () => {
  caretakerViewMode = "default";
  expandedCaretakerId = null;
  render();
});
expandedCaretakersViewButton.addEventListener("click", () => {
  caretakerViewMode = "expanded";
  expandedCaretakerId = null;
  render();
});
exitManagerModeButton.addEventListener("click", () => {
  const returnTo = localStorage.getItem(MANAGER_RETURN_KEY);
  localStorage.removeItem(MANAGER_SESSION_KEY);
  localStorage.removeItem(MANAGER_RETURN_KEY);
  if(returnTo === "schools.html"){
    window.location.href = "schools.html";
    return;
  }
  caretakerViewMode = "default";
  expandedCaretakerId = null;
  editId = null;
  selectedId = null;
  const url = new URL(window.location.href);
  url.searchParams.delete("mode");
  window.history.replaceState({}, "", url.pathname + url.search);
  render();
});
deleteButton.addEventListener("click", removeCurrent);
openSchoolsButton.addEventListener("click", openSchoolsForCaretaker);
clearCaretakerRoleButton.addEventListener("click", () => {
  clearActiveCaretakerRoleId();
  render();
});

editId = null;
selectedId = null;
closeCaretakerEditPanel();
(async function initPage(){
  if(await unlockManagerMode()){
    caretakerViewMode = "manager";
  }
  render();
})();
</script>

</body>
</html>
