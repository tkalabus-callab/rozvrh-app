<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Školy</title>
<link rel="stylesheet" href="styles.css">

<style>

body {
  font-family: Arial;
  padding:20px;
  background:#eef3f7;
  color:var(--color-text);
}

input { margin:2px; width:180px; }

.school-form-row {
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  gap:4px;
}

.favorite-trainers {
  margin:12px 0;
  padding:10px;
  border:1px solid var(--color-border);
  border-radius:10px;
  background:#ffffff;
  max-width:760px;
}

.favorite-trainers-title {
  font-weight:bold;
  margin-bottom:8px;
  color:var(--color-header);
  text-transform:uppercase;
}

.favorite-trainers-list {
  margin-top:8px;
}

.favorite-trainer-search-results {
  margin-top:6px;
  max-width:420px;
}

.favorite-trainer-search-result {
  display:block;
  margin:2px 0;
  padding:3px 6px;
  text-align:left;
}

.favorite-trainer-detail-row {
  display:flex;
  align-items:center;
  padding:4px 6px;
  margin-bottom:2px;
  border-radius:4px;
  background:#f7f7f7;
}

.favorite-trainer-detail-row:hover {
  background:#eeeeee;
}

.favorite-trainer-detail-name {
  width:230px;
  text-align:left;
}

.favorite-trainer-detail-actions {
  display:flex;
  gap:4px;
}

.favorite-trainer-detail-actions button {
  padding:2px 6px;
  font-size:12px;
}

.school-detail-panel {
  margin:16px auto;
  padding:14px 16px;
  max-width:960px;
  border:1px solid var(--color-border);
  border-radius:10px;
  background:#ffffff;
}

#detailTitle,
#listTitle {
  margin:0 0 10px;
  color:var(--color-header);
  font-size:16px;
  line-height:1.2;
  text-transform:uppercase;
}

#listTitle {
  max-width:960px;
  margin:18px auto 4px;
  padding:10px 14px;
  box-sizing:border-box;
  border-radius:8px;
  background:var(--color-header);
  color:#ffffff;
  font-weight:800;
}

.highlight-caretaker-name {
  color:#000000;
  background:var(--color-primary);
  padding:2px 6px;
  border-radius:4px;
  font-weight:900;
}

#listTitle + .school-detail-panel {
  margin-top:0;
}

.detail-actions {
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  max-width:760px;
  margin:12px 0;
}

.detail-action-buttons {
  display:flex;
  align-items:center;
  gap:6px;
}

.detail-action-buttons button {
  padding:6px 10px;
}

#saveNewSchoolButton {
  background: var(--color-primary);
  color:#fff;
  font-weight:700;
  border:1px solid var(--color-primary-dark);
}

#saveNewSchoolButton:hover {
  background: var(--color-primary-dark);
}

#saveButton {
  background: var(--color-primary);
  color:#fff;
  font-weight:700;
  border:1px solid var(--color-primary-dark);
}

#saveButton:hover {
  background: var(--color-primary-dark);
}

.assigned-trainers {
  margin-top:8px;
  padding:8px 10px;
  border:1px solid var(--color-border);
  border-radius:6px;
  background:#eef6fb;
}

.school-list-action {
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:30px;
  padding:0 12px;
  border:1px solid var(--color-border);
  border-radius:6px;
  background:#ffffff;
  color:var(--color-header);
  font-weight:700;
  line-height:1;
  cursor:pointer;
  transition:background 0.15s ease, border-color 0.15s ease;
}

.school-list-action:hover {
  border-color:var(--color-primary);
  background:#eef6fb;
}

#newSchoolButton {
  border:0;
  background:var(--color-header);
  color:#ffffff;
  box-shadow:0 4px 10px rgba(0,0,0,0.25);
  min-height:40px;
  line-height:1;
  padding:0 18px;
  font-weight:800;
  text-transform:uppercase;
  border-radius:8px;
  cursor:pointer;
  transition:background 0.15s ease, box-shadow 0.15s ease;
}

#newSchoolButton:hover,
#newSchoolButton:focus {
  background:var(--color-primary-dark);
  box-shadow:0 6px 14px rgba(0,0,0,0.3);
}

table {
  border-collapse: separate;
  border-spacing:0;
  table-layout:fixed;
  width:100%;
  margin:12px auto 0;
  max-width:960px;
  background:#ffffff;
  border:1px solid var(--color-border);
  border-radius:10px;
  overflow:hidden;
  font-size:13px;
}

td, th {
  border:0;
  border-bottom:1px solid rgba(44,62,85,0.12);
  padding:4px 8px;
  text-align:left;
  line-height:1.25;
}

th {
  color:#ffffff;
  background:var(--color-header);
  font-weight:bold;
  text-transform:uppercase;
  font-size:13px;
  line-height:1.2;
}

tbody tr:nth-child(even) {
  background:#f9fbfd;
}

tbody tr:last-child td {
  border-bottom:0;
}

.empty-state-cell {
  padding:16px 10px;
  color:var(--color-header);
  font-weight:700;
  text-align:center;
  background:#f8fbfd;
}

.school-workbook {
  margin:14px 0;
  display:grid;
  grid-template-columns:minmax(720px, 1fr) 246px;
  gap:12px;
  align-items:start;
}

.school-settings-grid {
  margin:12px 0;
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:start;
}

.school-workbook-section {
  border:1px solid var(--color-border);
  border-radius:8px;
  background:#f8fbfd;
  padding:10px;
}

.school-year-section,
.school-rate-section {
  width:224px;
  min-height:66px;
  box-sizing:border-box;
}

.school-rate-field {
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  color:var(--color-header);
  font-weight:800;
}

.school-rate-field select,
.school-rate-field input {
  width:108px;
  min-height:32px;
  border:1px solid var(--color-border);
  border-radius:6px;
  padding:0 10px;
  box-sizing:border-box;
  font-weight:800;
}

.school-workbook-section-plan,
.school-workbook-section-exceptions {
  min-width:0;
}

.school-workbook-title {
  margin:0 0 8px;
  color:var(--color-header);
  font-weight:800;
  text-transform:uppercase;
}

.school-workbook-title-row {
  display:flex;
  align-items:center;
  gap:10px;
  margin:0 0 8px;
}

.school-workbook-title-row .school-workbook-title {
  margin:0;
}

.school-year-badge {
  display:inline-flex;
  align-items:center;
  min-height:26px;
  padding:0 10px;
  border-radius:999px;
  background:var(--color-header);
  color:#ffffff;
  font-size:12px;
  font-weight:900;
  text-transform:uppercase;
  box-shadow:inset 0 -2px 0 rgba(0,0,0,0.18);
}

.school-workbook-form,
.school-workbook-actions {
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  align-items:center;
}

.school-workbook-form select,
.school-workbook-form input,
.school-workbook-form button,
.school-workbook-actions button,
.school-workbook-row button {
  min-height:32px;
  border-radius:6px;
  border:1px solid var(--color-border);
  padding:0 10px;
  box-sizing:border-box;
}

.school-workbook-form button,
.school-workbook-actions button,
.school-workbook-row button {
  background:var(--color-primary);
  color:#000000;
  font-weight:700;
  cursor:pointer;
}

#copyPreviousSchoolYearPlanButton {
  background:var(--color-header);
  color:#ffffff;
}

.school-workbook-list {
  margin-top:10px;
  display:flex;
  flex-direction:column;
  gap:6px;
}

.weekly-plan-grid {
  width:100%;
  margin-top:10px;
  border-collapse:separate;
  border-spacing:0;
  table-layout:fixed;
  border:1px solid var(--color-border);
  border-radius:8px;
  overflow:hidden;
  font-size:12px;
}

.weekly-plan-hour-col {
  width:124px;
}

.weekly-plan-day-col {
  width:20%;
}

.weekly-plan-grid th,
.weekly-plan-grid td {
  border:0;
  border-right:1px solid rgba(44,62,85,0.14);
  border-bottom:1px solid rgba(44,62,85,0.14);
  padding:6px;
  text-align:center;
  vertical-align:middle;
}

.weekly-plan-grid th:last-child,
.weekly-plan-grid td:last-child {
  border-right:0;
}

.weekly-plan-grid tr:last-child td {
  border-bottom:0;
}

.weekly-plan-hour {
  width:124px;
  color:var(--color-header);
  font-weight:800;
  background:#eef6fb;
}

.weekly-plan-hour-input {
  width:100%;
  min-height:30px;
  border:1px solid var(--color-border);
  border-radius:6px;
  padding:0 6px;
  box-sizing:border-box;
  color:var(--color-header);
  font-size:12px;
  font-weight:800;
  text-align:center;
}

.weekly-plan-cell {
  min-height:42px;
  background:#ffffff;
  cursor:pointer;
  transition:background 0.15s ease, box-shadow 0.15s ease;
}

.weekly-plan-cell:hover {
  background:#eef6fb;
}

.weekly-plan-cell.has-lesson {
  background:#dff4f7;
  color:var(--color-header);
  font-weight:800;
}

.weekly-plan-cell.is-unassigned {
  background:#ffe3e3;
  color:#9a1616;
  font-weight:900;
}

.weekly-plan-cell.is-selected {
  box-shadow:inset 0 0 0 3px var(--color-primary-dark);
  background:#fff7d6;
}

.weekly-plan-cell.is-selected.is-unassigned {
  background:#ffe3e3;
}

.weekly-plan-cell-trainer {
  display:block;
  margin-top:2px;
  color:#526173;
  font-size:11px;
  font-weight:700;
}

.weekly-plan-entry {
  display:block;
  padding:2px 3px;
  border-radius:4px;
  line-height:1.25;
  cursor:pointer;
  transition:background 0.15s ease, box-shadow 0.15s ease;
}

.weekly-plan-entry:hover {
  background:rgba(255,255,255,0.55);
}

.weekly-plan-entry.is-selected {
  background:#fff7d6;
  box-shadow:inset 0 0 0 2px var(--color-primary-dark);
}

.weekly-plan-entry + .weekly-plan-entry {
  margin-top:3px;
  border-top:1px solid rgba(44,62,85,0.12);
  padding-top:4px;
}

.weekly-plan-cell.is-unassigned .weekly-plan-cell-trainer {
  color:#9a1616;
  font-size:12px;
  font-weight:900;
}

.school-workbook-row {
  display:grid;
  grid-template-columns:1fr auto;
  gap:8px;
  align-items:center;
  padding:8px;
  border:1px solid rgba(44,62,85,0.14);
  border-radius:8px;
  background:#ffffff;
}

.school-workbook-row-main {
  color:var(--color-header);
  font-weight:800;
}

.school-workbook-row-meta {
  margin-top:2px;
  color:#5b6b7c;
  font-size:12px;
}

@media (max-width: 900px) {
  .school-settings-grid {
    flex-direction:column;
  }

  .school-year-section,
  .school-rate-section {
    width:100%;
  }

  .school-workbook {
    grid-template-columns:1fr;
  }
}

.school-workbook-empty {
  color:#5b6b7c;
  font-size:13px;
}

@media (max-width:900px) {
  .school-workbook {
    grid-template-columns:1fr;
  }
}

.compact-school-list {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px 12px;
}

.compact-school-list[hidden] {
  display:none;
}

.compact-school-column {
  display:flex;
  flex-direction:column;
  gap:6px;
}

.compact-school-item {
  padding:7px 9px;
  border:1px solid rgba(44,62,85,0.12);
  border-radius:6px;
  background:#ffffff;
  box-sizing:border-box;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
}

.compact-school-item.is-selected {
  background:#eef6fb;
  border-color:var(--color-primary);
  box-shadow:inset 0 0 0 2px var(--color-primary);
}

.compact-school-main {
  min-width:0;
}

.compact-school-title {
  color:var(--color-header);
  font-weight:800;
  font-size:13px;
  line-height:1.2;
}

.compact-school-meta {
  margin-top:2px;
  color:#5b6b7c;
  font-size:12px;
  line-height:1.2;
}

.caretaker-inline {
  display:inline-flex;
  align-items:center;
  gap:6px;
  color:var(--color-header);
  font-weight:800;
}

.caretaker-color-dot {
  display:inline-block;
  width:14px;
  height:14px;
  min-width:14px;
  border-radius:50%;
  border:1px solid rgba(44,62,85,0.25);
  background:#ddd;
  vertical-align:middle;
}

.compact-school-action {
  flex:0 0 auto;
}

tr.is-drop-target td {
  background:#eef6fb !important;
}

.compact-empty {
  grid-column:1 / -1;
  padding:16px 10px;
  color:var(--color-header);
  font-weight:700;
  text-align:center;
  background:#f8fbfd;
  border-radius:6px;
}

.col-name { width:33%; }
.col-city { width:33%; }

th:nth-child(3),
td:nth-child(3) {
  width:34%;
}

th:nth-child(1),
td:nth-child(1) {
  width:42px;
}

th:nth-child(4),
td:nth-child(4) {
  width:130px;
}

th:nth-child(5),
td:nth-child(5) {
  width:72px;
  text-align:center;
}

tr.active {
  background:#eef6fb !important;
  color:var(--color-header);
  font-weight:bold;
  outline:2px solid var(--color-primary);
  box-shadow:none;
}

tr.active .school-list-action {
  border-color:#c00;
  background:#fff0f0;
  color:#c00;
  font-weight:bold;
}

tr.is-selected,
tr.is-selected:hover {
  background:#eef6fb !important;
  outline:2px solid var(--color-primary);
  box-shadow:inset 0 0 0 1px var(--color-primary);
}

tr:hover {
  background:#f0f8fb !important;
  cursor:pointer;
}

.specific-caretaker-picker {
  position:relative;
  display:inline-flex;
}

.specific-caretaker-dropdown {
  position:absolute;
  top:calc(100% + 6px);
  left:0;
  z-index:20;
  min-width:220px;
  padding:6px;
  border:1px solid var(--color-border);
  border-radius:8px;
  background:#ffffff;
  box-shadow:0 6px 16px rgba(0,0,0,0.2);
}

.specific-caretaker-dropdown[hidden] {
  display:none;
}

.specific-caretaker-dropdown button {
  width:100%;
  padding:8px 10px;
  border:0;
  border-radius:6px;
  background:#ffffff;
  color:var(--color-header);
  text-align:left;
  font-weight:700;
  cursor:pointer;
}

.specific-caretaker-dropdown button:hover {
  background:#eef6fb;
}

.specific-caretaker-dropdown button.is-active {
  background:#dff2f7;
  box-shadow:inset 0 0 0 2px var(--color-primary);
  font-weight:800;
}
</style>
</head>

<body>
<script>
(function(){
  const managerLoggedIn = sessionStorage.getItem("managerModeUnlocked") === "1";
  const caretakerId = localStorage.getItem("caretakerId") || "";
  const sessionCaretakerId = sessionStorage.getItem("caretakerModeUnlocked") || "";
  let caretakers = [];
  try { caretakers = JSON.parse(localStorage.getItem("caretakers") || "[]"); } catch {}
  const caretakerLoggedIn = Boolean(
    caretakerId &&
    sessionCaretakerId &&
    String(caretakerId) === String(sessionCaretakerId) &&
    caretakers.some(item => String(item.id) === String(caretakerId))
  );
  if(!managerLoggedIn && !caretakerLoggedIn){
    window.location.replace("home.html");
  }
})();
</script>

<div class="page-header">

<script type="module">
import { TEXTS } from "./texts.js";

const pageTitle = document.getElementById("pageTitle");
const backLink = document.getElementById("backLink");
const newSchoolButton = document.getElementById("newSchoolButton");
const schoolDetailPanel = document.getElementById("schoolDetailPanel");
const nazev = document.getElementById("nazev");
const ulice = document.getElementById("ulice");
const mesto = document.getElementById("mesto");
const psc = document.getElementById("psc");
const ico = document.getElementById("ico");

function normalizeSchool(school){
  return {
    ...school,
    favoriteTrainers: school.favoriteTrainers || [],
    assignedTrainerId: school.assignedTrainerId ?? null,
    assignedCaretakerId: school.assignedCaretakerId || "",
    rate: school.rate || "",
    lessonTimes: Array.isArray(school.lessonTimes) ? school.lessonTimes : []
  };
}

function normalizeSchools(items){
  return items.map(normalizeSchool);
}

schools = normalizeSchools(schools);

function loadTrainers(){
  try {
    return JSON.parse(localStorage.getItem("trainers")) || [];
  } catch {
    return [];
  }
}

function loadCaretakers(){
  try {
    return JSON.parse(localStorage.getItem("caretakers") || "[]");
  } catch {
    return [];
  }
}

function getRoleCaretakerId(){
  return localStorage.getItem(CARETAKER_ID_STORAGE_KEY) || "";
}

function getCaretakerById(caretakerId){
  return loadCaretakers().find(item => String(item.id) === String(caretakerId)) || null;
}

function isManagerRoleMode(){
  return sessionStorage.getItem(MANAGER_SESSION_KEY) === "1";
}

function hasValidCaretakerRole(){
  const caretakerId = getRoleCaretakerId();
  const sessionCaretakerId = sessionStorage.getItem(CARETAKER_SESSION_KEY) || "";
  return Boolean(
    caretakerId &&
    sessionCaretakerId &&
    String(caretakerId) === String(sessionCaretakerId) &&
    getCaretakerById(caretakerId)
  );
}

function getCaretakerNameById(caretakerId){
  if (!caretakerId) return "Bez školníka";

  const caretakers = loadCaretakers();
  const item = caretakers.find(c => String(c.id) === String(caretakerId));

  if (!item) return "Bez školníka";

  const fullName = `${item.prijmeni || ""} ${item.jmeno || ""}`.trim();
  return fullName || item.name || "Bez školníka";
}

function getCaretakerColorById(caretakerId){
  if (!caretakerId) return "#ddd";

  const caretakers = loadCaretakers();
  const item = caretakers.find(c => String(c.id) === String(caretakerId));

  return item?.color || "#ddd";
}

function createCaretakerInline(caretakerId){
  const wrap = document.createElement("span");
  wrap.className = "caretaker-inline";

  const dot = document.createElement("span");
  dot.className = "caretaker-color-dot";
  dot.style.background = getCaretakerColorById(caretakerId);

  const name = document.createElement("span");
  name.textContent = getCaretakerNameById(caretakerId);

  wrap.append(dot, name);
  return wrap;
}

function getTrainerNameById(trainerId){
  if (!trainerId) return "Bez trenéra";
  if (String(trainerId) === UNASSIGNED_TRAINER_VALUE) return "Neobsazeno";

  const trainers = loadTrainers();
  const item = trainers.find(t => String(t.id) === String(trainerId));

  if (!item) return "Bez trenéra";

  const fullName = `${item.prijmeni || ""} ${item.jmeno || ""}`.trim();
  return fullName || item.name || "Bez trenéra";
}

function fillSelect(select, items, selectedValue = ""){
  if(!select) return;
  select.replaceChildren();
  items.forEach(item => {
    const option = document.createElement("option");
    option.value = String(item.value);
    option.textContent = item.label;
    option.selected = String(item.value) === String(selectedValue);
    select.appendChild(option);
  });
}

function getSchoolYearStartYearForDate(date = new Date()){
  const value = new Date(date);
  const year = value.getFullYear();
  return value.getMonth() >= 8 ? year : year - 1;
}

function getCurrentSchoolYearValue(){
  return String(getSchoolYearStartYearForDate(new Date()));
}

function formatSchoolYearLabel(startYear){
  const year = Number(startYear);
  return `${year}/${year + 1}`;
}

function getSchoolYearOptions(){
  const current = getSchoolYearStartYearForDate(new Date());
  return Array.from({ length: 6 }, (_, index) => {
    const year = current - 1 + index;
    return { value: String(year), label: formatSchoolYearLabel(year) };
  });
}

function getSelectedWorkbookSchoolYear(){
  return String(workbookSchoolYear?.value || getCurrentSchoolYearValue());
}

function updateWeeklyPlanSchoolYearBadge(){
  if(!weeklyPlanSchoolYearBadge) return;
  weeklyPlanSchoolYearBadge.textContent = `Školní rok ${formatSchoolYearLabel(getSelectedWorkbookSchoolYear())}`;
}

function getPlanItemSchoolYear(item){
  return String(item?.schoolYear || getCurrentSchoolYearValue());
}

function getExceptionSchoolYear(item){
  if(item?.schoolYear) return String(item.schoolYear);
  if(item?.date) return String(getSchoolYearStartYearForDate(item.date));
  return getCurrentSchoolYearValue();
}

function loadSchoolYearPlan(){

}

function saveSchoolYearPlan(items){

function loadSchoolYearExceptions(){

  }
}

function saveSchoolYearExceptions(items){

}

function getYearSortValue(value){
  return String(value) === "skolka" ? 0 : Number(value) || 99;
}

function getYearLabel(value){
  return SCHOOL_YEARS.find(item => String(item.value) === String(value))?.label || value || "-";
}

function setLessonTimesDraft(values = []){
  currentLessonTimesDraft = Array.from({ length: 8 }, (_, index) => values[index] || "");
}

function getLessonTimesFromInputs(){
  return Array.from({ length: 8 }, (_, index) => currentLessonTimesDraft[index] || "");
}

function refreshWeeklyPlanTrainerSelect(){
  const selectedValue = weeklyPlanTrainer?.value || "";
  const trainerItems = loadTrainers()
    .map(trainer => ({
      value: trainer.id,
      label: `${trainer.prijmeni || ""} ${trainer.jmeno || ""}`.trim() || trainer.name || ""
    }))
    .filter(item => item.value && item.label)
    .sort((a, b) => a.label.localeCompare(b.label, "cs"));

  fillSelect(weeklyPlanTrainer, [
    { value: "", label: "Vyber trenéra" },
    { value: UNASSIGNED_TRAINER_VALUE, label: "Neobsazeno" },
    ...trainerItems
  ], selectedValue);
}

function getCurrentSchoolId(){
  return String(editId || selectedId || "");
}

function getWeeklyPlanForCurrentSchool(){
  const schoolId = getCurrentSchoolId();
  const schoolYear = getSelectedWorkbookSchoolYear();
  return loadSchoolYearPlan()
    .filter(item =>
      String(item.schoolId || "") === schoolId &&
      getPlanItemSchoolYear(item) === schoolYear
    )
    .sort((a, b) =>
      getYearSortValue(a.year) - getYearSortValue(b.year) ||
      Number(a.dayIndex) - Number(b.dayIndex) ||
      Number(a.hour) - Number(b.hour) ||
      String(a.className).localeCompare(String(b.className), "cs")
    );
}

function getSelectedWeeklyPlanLesson(dayIndex, hour){
  return getWeeklyPlanForCurrentSchool().find(item =>
    String(item.year) === String(weeklyPlanYear.value) &&
    String(item.className) === String(weeklyPlanClass.value) &&
    Number(item.dayIndex) === Number(dayIndex) &&
    Number(item.hour) === Number(hour)
  );
}

function getWeeklyPlanLessonsForCell(dayIndex, hour){
  return getWeeklyPlanForCurrentSchool()
    .filter(item =>
      Number(item.dayIndex) === Number(dayIndex) &&
      Number(item.hour) === Number(hour)
    )
    .sort((a, b) =>
      getYearSortValue(a.year) - getYearSortValue(b.year) ||
      String(a.className).localeCompare(String(b.className), "cs") ||
      getTrainerNameById(a.trainerId).localeCompare(getTrainerNameById(b.trainerId), "cs")
    );
}

function getTrainerSurnameById(trainerId){
  if(String(trainerId || "") === UNASSIGNED_TRAINER_VALUE) return "Neobsazeno";
  const trainer = loadTrainers().find(item => String(item.id) === String(trainerId));
  return trainer?.prijmeni || getTrainerNameById(trainerId);
}

function formatWeeklyPlanLesson(lesson){
  return `${getYearLabel(lesson.year)} ${lesson.className || "-"} ${getTrainerSurnameById(lesson.trainerId)}`.trim();
}

function isSelectedWeeklyPlanLesson(lesson){
  return selectedWeeklyPlanCell &&
    Number(selectedWeeklyPlanCell.dayIndex) === Number(lesson.dayIndex) &&
    Number(selectedWeeklyPlanCell.hour) === Number(lesson.hour) &&
    String(weeklyPlanYear.value) === String(lesson.year) &&
    String(weeklyPlanClass.value) === String(lesson.className);
}

function setWeeklyPlanTrainerSelectFromSelectedCell(){
  if(!selectedWeeklyPlanCell){
    weeklyPlanTrainer.value = "";
    return;
  }

  const lesson = getSelectedWeeklyPlanLesson(selectedWeeklyPlanCell.dayIndex, selectedWeeklyPlanCell.hour);
  weeklyPlanTrainer.value = lesson?.trainerId ? String(lesson.trainerId) : "";
}

function renderWeeklyPlanLessons(){
  if(!weeklyPlanGrid) return;

  if(!getCurrentSchoolId()){
    weeklyPlanGrid.innerHTML = '<div class="school-workbook-empty">Nejdřív ulož nebo vyber školu.</div>';
    return;
  }

  const table = document.createElement("table");
  table.className = "weekly-plan-grid";
  const colgroup = document.createElement("colgroup");
  const hourCol = document.createElement("col");
  hourCol.className = "weekly-plan-hour-col";
  colgroup.appendChild(hourCol);
  SCHOOL_DAYS.forEach(() => {
    const dayCol = document.createElement("col");
    dayCol.className = "weekly-plan-day-col";
    colgroup.appendChild(dayCol);
  });
  table.appendChild(colgroup);

  const thead = document.createElement("thead");
  const headRow = document.createElement("tr");
  const blank = document.createElement("th");
  blank.textContent = "H";
  headRow.appendChild(blank);

  SCHOOL_DAYS.forEach(day => {
    const th = document.createElement("th");
    th.textContent = day;
    headRow.appendChild(th);
  });
  thead.appendChild(headRow);
  table.appendChild(thead);

  const tbody = document.createElement("tbody");
  for(let hour = 1; hour <= 8; hour++){
    const row = document.createElement("tr");
    const hourCell = document.createElement("td");
    hourCell.className = "weekly-plan-hour";
    const hourInput = document.createElement("input");
    hourInput.className = "weekly-plan-hour-input";
    hourInput.dataset.hour = String(hour);
    hourInput.placeholder = `${hour}. hodina`;
    hourInput.value = currentLessonTimesDraft[hour - 1] || "";
    hourInput.addEventListener("input", () => {
      currentLessonTimesDraft[hour - 1] = hourInput.value.trim();
    });
    hourCell.replaceChildren(hourInput);
    row.appendChild(hourCell);

    SCHOOL_DAYS.forEach((day, dayIndex) => {
      const lessons = getWeeklyPlanLessonsForCell(dayIndex, hour);
      const cell = document.createElement("td");
      cell.className = "weekly-plan-cell";
      if(lessons.length) cell.classList.add("has-lesson");
      if(lessons.some(lesson => String(lesson?.trainerId || "") === UNASSIGNED_TRAINER_VALUE)) cell.classList.add("is-unassigned");
      if(selectedWeeklyPlanCell && selectedWeeklyPlanCell.dayIndex === dayIndex && selectedWeeklyPlanCell.hour === hour){
        cell.classList.add("is-selected");
      }

      cell.dataset.dayIndex = String(dayIndex);
      cell.dataset.hour = String(hour);
      if(lessons.length){
        cell.replaceChildren(...lessons.map(lesson => {
          const entry = document.createElement("div");
          entry.className = "weekly-plan-entry";
          if(isSelectedWeeklyPlanLesson(lesson)) entry.classList.add("is-selected");
          entry.textContent = formatWeeklyPlanLesson(lesson);
          entry.title = "Kliknutím vybereš tento zápis";
          entry.addEventListener("click", (event) => {
            event.stopPropagation();
            selectWeeklyPlanLesson(lesson);
          });
          return entry;
        }));
      }
      cell.title = `${day} | ${hour}. hodina`;
      cell.addEventListener("click", () => selectWeeklyPlanCell(dayIndex, hour));
      row.appendChild(cell);
    });

    tbody.appendChild(row);
  }
  table.appendChild(tbody);
  weeklyPlanGrid.replaceChildren(table);
}

function selectWeeklyPlanCell(dayIndex, hour){
  selectedWeeklyPlanCell = { dayIndex, hour };
  setWeeklyPlanTrainerSelectFromSelectedCell();
  renderWeeklyPlanLessons();
}

function selectWeeklyPlanLesson(lesson){
  selectedWeeklyPlanCell = {
    dayIndex: Number(lesson.dayIndex),
    hour: Number(lesson.hour)
  };
  weeklyPlanYear.value = String(lesson.year);
  weeklyPlanClass.value = String(lesson.className);
  weeklyPlanTrainer.value = lesson?.trainerId ? String(lesson.trainerId) : "";
  renderWeeklyPlanLessons();
}

function canSaveWeeklyPlanLesson(lesson){
  const lessonsInSameYear = getWeeklyPlanForCurrentSchool().filter(item =>
    String(item.schoolId) === String(lesson.schoolId) &&
    getPlanItemSchoolYear(item) === String(lesson.schoolYear) &&
    String(item.year) === String(lesson.year) &&
    Number(item.dayIndex) === Number(lesson.dayIndex) &&
    Number(item.hour) === Number(lesson.hour)
  );
  const classNames = new Set(lessonsInSameYear.map(item => String(item.className)));
  classNames.add(String(lesson.className));

  if(classNames.size > 2){
    alert("Ve stejném čase lze ve stejném ročníku zadat maximálně dvě třídy.");
    return false;
  }

  return true;
}

function saveWeeklyPlanTrainerToSelectedCell(){
  const schoolId = getCurrentSchoolId();
  if(!schoolId || !selectedWeeklyPlanCell || !weeklyPlanTrainer.value) return;

  const lesson = {
    id: `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
    schoolId,
    schoolYear: getSelectedWorkbookSchoolYear(),
    year: weeklyPlanYear.value,
    className: weeklyPlanClass.value,
    dayIndex: Number(selectedWeeklyPlanCell.dayIndex),
    hour: Number(selectedWeeklyPlanCell.hour),
    trainerId: weeklyPlanTrainer.value
  };

  if(!canSaveWeeklyPlanLesson(lesson)) return;

  const items = loadSchoolYearPlan().filter(item => !(
    String(item.schoolId) === lesson.schoolId &&
    getPlanItemSchoolYear(item) === String(lesson.schoolYear) &&
    String(item.year) === String(lesson.year) &&
    String(item.className) === String(lesson.className) &&
    Number(item.dayIndex) === lesson.dayIndex &&
    Number(item.hour) === lesson.hour
  ));

  saveSchoolYearPlan([...items, lesson]);
  renderWeeklyPlanLessons();
}

function removeSelectedWeeklyPlanLesson(){
  if(!selectedWeeklyPlanCell) return;
  const schoolId = getCurrentSchoolId();
  const { dayIndex, hour } = selectedWeeklyPlanCell;

  saveSchoolYearPlan(loadSchoolYearPlan().filter(item => !(
    String(item.schoolId) === schoolId &&
    getPlanItemSchoolYear(item) === getSelectedWorkbookSchoolYear() &&
    String(item.year) === String(weeklyPlanYear.value) &&
    String(item.className) === String(weeklyPlanClass.value) &&
    Number(item.dayIndex) === Number(dayIndex) &&
    Number(item.hour) === Number(hour)
  )));
  weeklyPlanTrainer.value = "";
  renderWeeklyPlanLessons();
}

function copyPreviousSchoolYearPlan(){
  const schoolId = getCurrentSchoolId();
  if(!schoolId) return;

  const targetYear = Number(getSelectedWorkbookSchoolYear());
  if(!Number.isFinite(targetYear)) return;

  const sourceYear = String(targetYear - 1);
  const targetYearValue = String(targetYear);
  const allItems = loadSchoolYearPlan();
  const sourceItems = allItems.filter(item =>
    String(item.schoolId || "") === schoolId &&
    getPlanItemSchoolYear(item) === sourceYear
  );

  if(!sourceItems.length){
    alert("V předchozím školním roce není pro tuto školu uložený žádný týdenní rozvrh.");
    return;
  }

  const targetItems = allItems.filter(item =>
    String(item.schoolId || "") === schoolId &&
    getPlanItemSchoolYear(item) === targetYearValue
  );

  if(targetItems.length && !confirm("Vybraný školní rok už má uložený rozvrh. Přepsat ho rozvrhem z předchozího roku?")){
    return;
  }

  const copiedItems = sourceItems.map(item => ({
    ...item,
    id: `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
    schoolYear: targetYearValue
  }));

  saveSchoolYearPlan([
    ...allItems.filter(item => !(
      String(item.schoolId || "") === schoolId &&
      getPlanItemSchoolYear(item) === targetYearValue
    )),
    ...copiedItems
  ]);

  selectedWeeklyPlanCell = { dayIndex: 0, hour: 1 };
  setWeeklyPlanTrainerSelectFromSelectedCell();
  renderWeeklyPlanLessons();
  alert(`Zkopírováno ${copiedItems.length} položek z roku ${formatSchoolYearLabel(sourceYear)}.`);
}

function getExceptionsForCurrentSchool(){
  const schoolId = getCurrentSchoolId();
  const schoolYear = getSelectedWorkbookSchoolYear();
  return loadSchoolYearExceptions()
    .filter(item =>
      String(item.schoolId || "") === schoolId &&
      getExceptionSchoolYear(item) === schoolYear
    )
    .sort((a, b) => String(a.date || "").localeCompare(String(b.date || "")));
}

function renderExceptions(){
  if(!exceptionsList) return;
  const items = getExceptionsForCurrentSchool();
  exceptionsList.hidden = !exceptionsVisible;
  if(toggleExceptionsButton){
    toggleExceptionsButton.textContent = exceptionsVisible ? "Skrýt výjimky" : `Zobrazit výjimky (${items.length})`;
  }

  if(!getCurrentSchoolId()){
    exceptionsList.innerHTML = '<div class="school-workbook-empty">Nejdřív ulož nebo vyber školu.</div>';
    return;
  }

  if(!items.length){
    exceptionsList.innerHTML = '<div class="school-workbook-empty">Zatím nejsou zadané žádné výjimky.</div>';
    return;
  }

  exceptionsList.replaceChildren(...items.map(item => {
    const row = document.createElement("div");
    row.className = "school-workbook-row";

    const main = document.createElement("div");
    const title = document.createElement("div");
    title.className = "school-workbook-row-main";
    title.textContent = `${new Date(item.date).toLocaleDateString("cs-CZ")} | ${item.reason || "Výjimka"}`;
    const meta = document.createElement("div");
    meta.className = "school-workbook-row-meta";
    meta.textContent = item.note || "";
    main.append(title, meta);

    const removeButton = document.createElement("button");
    removeButton.type = "button";
    removeButton.textContent = "Smazat";
    removeButton.addEventListener("click", () => {
      saveSchoolYearExceptions(loadSchoolYearExceptions().filter(exception => exception.id !== item.id));
      renderExceptions();
    });

    row.append(main, removeButton);
    return row;
  }));
}

function addException(){
  const schoolId = getCurrentSchoolId();
  if(!schoolId || !exceptionDate.value) return;

  const selectedSchoolYear = getSelectedWorkbookSchoolYear();
  const dateSchoolYear = String(getSchoolYearStartYearForDate(exceptionDate.value));
  if(dateSchoolYear !== selectedSchoolYear){
    alert("Datum výjimky nepatří do vybraného školního roku.");
    return;
  }

  const item = {
    id: `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
    schoolId,
    schoolYear: selectedSchoolYear,
    date: exceptionDate.value,
    reason: exceptionReason.value,
    note: exceptionNote.value
  };

  const items = loadSchoolYearExceptions().filter(existing => !(
    String(existing.schoolId) === schoolId &&
    getExceptionSchoolYear(existing) === String(item.schoolYear) &&
    String(existing.date) === String(item.date)
  ));

  saveSchoolYearExceptions([...items, item]);
  exceptionNote.value = "";
  exceptionsVisible = true;
  renderExceptions();
}

function renderSchoolWorkbook(){
  updateWeeklyPlanSchoolYearBadge();
  refreshWeeklyPlanTrainerSelect();
  if(!selectedWeeklyPlanCell){
    selectedWeeklyPlanCell = { dayIndex: 0, hour: 1 };
  }
  setWeeklyPlanTrainerSelectFromSelectedCell();
  renderWeeklyPlanLessons();
  renderExceptions();
}

function lightenColor(hex, amount = 0.85){
  if (!hex || hex.length < 7) return "";

  const r = parseInt(hex.substring(1,3),16);
  const g = parseInt(hex.substring(3,5),16);
  const b = parseInt(hex.substring(5,7),16);

  const newR = Math.round(r + (255 - r) * amount);
  const newG = Math.round(g + (255 - g) * amount);
  const newB = Math.round(b + (255 - b) * amount);

  return `rgb(${newR}, ${newG}, ${newB})`;
}

function updateAssignedCaretakerSelectStyle(){
  const caretakerId = assignedCaretakerId.value;
  const color = getCaretakerColorById(caretakerId);
  const bg = caretakerId ? lightenColor(color, 0.88) : "";

  assignedCaretakerId.style.background = bg || "";
  assignedCaretakerId.style.borderColor = caretakerId ? color : "";
  assignedCaretakerId.style.fontWeight = caretakerId ? "700" : "";
}

function syncAssignedCaretakerField(selectedValue = assignedCaretakerId.value || ""){
  const showPicker = isManagerRoleMode();
  if(assignedCaretakerLabel) assignedCaretakerLabel.hidden = !showPicker;
  if(assignedCaretakerId){
    assignedCaretakerId.hidden = !showPicker;
    assignedCaretakerId.disabled = !showPicker;
    if(showPicker) renderCaretakerSelect(selectedValue);
  }
  updateAssignedCaretakerSelectStyle();

function updateFavoriteTrainerLimitState(){

function renderFavoriteTrainerSearchResults(){
  const query = favoriteTrainerSearch.value.trim().toLowerCase();
  const selectedIdSet = new Set(currentFavoriteTrainerIds.map(String));
  const fragment = document.createDocumentFragment();

  if(query){
    loadTrainers()
      .filter(trainer => !selectedIdSet.has(String(trainer.id)))
      .filter(trainer =>
        `${trainer.prijmeni || ""} ${trainer.jmeno || ""}`.toLowerCase().includes(query) ||
        `${trainer.jmeno || ""} ${trainer.prijmeni || ""}`.toLowerCase().includes(query)
      )
      .slice(0, 10)
      .forEach(trainer => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "favorite-trainer-search-result";
        button.textContent = `${trainer.prijmeni || ""} ${trainer.jmeno || ""}`.trim();
        button.addEventListener("click", () => addFavoriteTrainerToCurrent(trainer.id));
        fragment.appendChild(button);
      });
  }

  favoriteTrainerSearchResults.replaceChildren(fragment);
}

function renderSelectedFavoriteTrainers(){
  const trainers = loadTrainers();
  const trainersById = new Map(trainers.map(trainer => [String(trainer.id), trainer]));
  const fragment = document.createDocumentFragment();

  currentFavoriteTrainerIds
    .map(id => trainersById.get(String(id)))
    .filter(Boolean)
    .forEach((trainer, index) => {
      const line = document.createElement("div");
      line.className = "favorite-trainer-detail-row";

      const trainerName = document.createElement("span");
      trainerName.className = "favorite-trainer-detail-name";
      trainerName.textContent = `${trainer.prijmeni || ""} ${trainer.jmeno || ""}`.trim();
      line.appendChild(trainerName);

      const buttons = document.createElement("span");
      buttons.className = "favorite-trainer-detail-actions";

      const upButton = document.createElement("button");
      upButton.type = "button";
      upButton.textContent = "↑";
      upButton.disabled = index === 0;
      upButton.addEventListener("click", () => moveCurrentFavoriteTrainer(trainer.id, -1));
      buttons.appendChild(upButton);

      const downButton = document.createElement("button");
      downButton.type = "button";
      downButton.textContent = "↓";
      downButton.disabled = index === currentFavoriteTrainerIds.length - 1;
      downButton.addEventListener("click", () => moveCurrentFavoriteTrainer(trainer.id, 1));
      buttons.appendChild(downButton);

      const removeButton = document.createElement("button");
      removeButton.type = "button";
      removeButton.textContent = "Odebrat";
      removeButton.addEventListener("click", () => removeCurrentFavoriteTrainer(trainer.id));
      buttons.appendChild(removeButton);

      line.appendChild(buttons);
      fragment.appendChild(line);
    });

  if(!fragment.childNodes.length){
    fragment.append(TEXTS.common.placeholderDash);
  }

  favoriteTrainersList.replaceChildren(fragment);
}

function renderFavoriteTrainerOptions(selectedIds = []){
  currentFavoriteTrainerIds = selectedIds.map(String);
  favoriteTrainerSearch.value = "";
  renderFavoriteTrainerSearchResults();
  renderSelectedFavoriteTrainers();
  updateFavoriteTrainerLimitState();
}

function addFavoriteTrainerToCurrent(trainerId){
  const value = String(trainerId);
  if(currentFavoriteTrainerIds.includes(value)) return;
  if(currentFavoriteTrainerIds.length >= 10){
    alert("Maximálně 10 trenérů");
    return;
  }
  currentFavoriteTrainerIds.push(value);
  favoriteTrainerSearch.value = "";
  renderFavoriteTrainerSearchResults();
  renderSelectedFavoriteTrainers();
  updateFavoriteTrainerLimitState();
}

function moveCurrentFavoriteTrainer(trainerId, direction){
  const index = currentFavoriteTrainerIds.findIndex(id => String(id) === String(trainerId));
  const newIndex = index + direction;
  if(index === -1 || newIndex < 0 || newIndex >= currentFavoriteTrainerIds.length) return;
  [currentFavoriteTrainerIds[index], currentFavoriteTrainerIds[newIndex]] = [currentFavoriteTrainerIds[newIndex], currentFavoriteTrainerIds[index]];
  renderSelectedFavoriteTrainers();
}

function removeCurrentFavoriteTrainer(trainerId){
  currentFavoriteTrainerIds = currentFavoriteTrainerIds.filter(id => String(id) !== String(trainerId));
  renderFavoriteTrainerSearchResults();
  renderSelectedFavoriteTrainers();
  updateFavoriteTrainerLimitState();
}

function renderCaretakerSelect(selectedId = ""){

    option.value = String(caretaker.id);

    const surname = caretaker.prijmeni || "";
    const name = caretaker.jmeno || "";
    const fullName = `${surname} ${name}`.trim();

    option.selected = String(selectedId || "") === String(caretaker.id);

function sortSchools(items){
  return items.slice().sort((a, b) => {
    const cityCompare = (a.mesto || "").localeCompare(b.mesto || "", "cs");
    if(cityCompare !== 0) return cityCompare;
    return (a.nazev || "").localeCompare(b.nazev || "", "cs");
  });
}

function getAvailableSpecificCaretakerIds(){
  const ids = schools
    .map(s => s.assignedCaretakerId || "")
    .filter((id, index, items) => items.indexOf(id) === index);

  return ids;
}

function syncViewModeButtons(){
  let activeViewModeText = "";
  viewOptionButtons.forEach(button => {

    if(button.dataset.viewMode === "specific-caretaker"){
      button.textContent = "Podle konkrétního školníka";

        const name = getCaretakerNameById(currentSpecificCaretakerId);
        activeViewModeText = `Podle konkrétního školníka: <span class="highlight-caretaker-name">${name}</span>`;

function renderCompactSchools(items){
  if(!compactSchoolList) return;

  const sortedItems = sortSchools(items);
  if(sortedItems.length === 0){
    const empty = document.createElement("div");
    empty.className = "compact-empty";
    empty.textContent = "Žádné školy k zobrazení.";
    compactSchoolList.replaceChildren(empty);
    return;
  }

  const midpoint = Math.ceil(sortedItems.length / 2);
  const columns = [sortedItems.slice(0, midpoint), sortedItems.slice(midpoint)];
  const fragment = document.createDocumentFragment();

  columns.forEach(columnItems => {
    const column = document.createElement("div");
    column.className = "compact-school-column";

    columnItems.forEach(s => {
      const item = document.createElement("div");
      item.className = "compact-school-item";
      if(String(s.id) === String(selectedId) || String(s.id) === String(editId)) item.classList.add("is-selected");

      const main = document.createElement("div");
      main.className = "compact-school-main";

      const title = document.createElement("div");
      title.className = "compact-school-title";
      title.textContent = `${s.mesto || TEXTS.common.placeholderDash} · ${s.nazev || TEXTS.common.placeholderDash}`;

      const meta = document.createElement("div");
      meta.className = "compact-school-meta";
      meta.appendChild(createCaretakerInline(s.assignedCaretakerId));

      const editButton = document.createElement("button");
      editButton.type = "button";
      editButton.className = "school-list-action compact-school-action";
      editButton.textContent = TEXTS.common.edit;
      editButton.addEventListener("click", () => {
        edit(s.id);
        showDetail(s.id);
        schoolDetailPanel.scrollIntoView({ block: "start", behavior: "smooth" });
      });

      main.appendChild(title);
      main.appendChild(meta);
      item.appendChild(main);
      item.appendChild(editButton);
      column.appendChild(item);
    });

    fragment.appendChild(column);
  });

  compactSchoolList.replaceChildren(fragment);
}

function moveFavoriteTrainer(schoolId, trainerId, direction){
  const school = schools.find(s => s.id === schoolId);
  if(!school) return;

  const favoriteTrainers = school.favoriteTrainers || [];
  const index = favoriteTrainers.findIndex(id => String(id) === String(trainerId));
  const newIndex = index + direction;

  if(index === -1 || newIndex < 0 || newIndex >= favoriteTrainers.length) return;

  [favoriteTrainers[index], favoriteTrainers[newIndex]] = [favoriteTrainers[newIndex], favoriteTrainers[index]];
  school.favoriteTrainers = favoriteTrainers;
  localStorage.setItem("schools", JSON.stringify(schools));
  showDetail(schoolId);
}

function removeFavoriteTrainer(schoolId, trainerId){
  const school = schools.find(s => s.id === schoolId);
  if(!school) return;

  school.favoriteTrainers = (school.favoriteTrainers || []).filter(id => String(id) !== String(trainerId));
  localStorage.setItem("schools", JSON.stringify(schools));
  showDetail(schoolId);
}

function highlightGroup(headerRow){
  let next = headerRow.nextElementSibling;

  headerRow.classList.add("is-drop-target");

  while (next && !next.dataset.groupHeader) {
    next.classList.add("is-drop-target");
    next = next.nextElementSibling;
  }
}

function clearHighlight(headerRow){
  let next = headerRow.nextElementSibling;

  headerRow.classList.remove("is-drop-target");

  while (next && !next.dataset.groupHeader) {
    next.classList.remove("is-drop-target");
    next = next.nextElementSibling;
  }
}

function add(){
  if(!nazev.value) return;

  const existingSchool = editId
    ? schools.find(s => String(s.id) === String(editId))
    : null;
  const assignedCaretakerValue = isManagerRoleMode()
    ? assignedCaretakerId.value || ""
    : (existingSchool?.assignedCaretakerId || (hasValidCaretakerRole() ? getRoleCaretakerId() : ""));
  let obj = {
    id: editId || Date.now().toString(),
    nazev: nazev.value,
    ulice: ulice.value,
    mesto: mesto.value,
    psc: psc.value,
    ico: ico.value,
    kontakt: kontakt.value,
    email: email.value,
    telefon: telefon.value,
    rate: schoolRate.value,
    lessonTimes: getLessonTimesFromInputs(),
    poznamka: poznamka.value,
    favoriteTrainers: existingSchool?.favoriteTrainers || [],
    assignedTrainerId: existingSchool?.assignedTrainerId ?? null,
    assignedCaretakerId: assignedCaretakerValue
  };

  if(editId){
    schools = schools.map(s => String(s.id) === String(editId) ? obj : s);
  } else {
    schools.push(obj);
  }

  localStorage.setItem("schools", JSON.stringify(schools));
  clearForm();
  render();
  closeSchoolDetailPanel();
}

function render(){
  if(currentViewMode === "specific-caretaker"){
    ensureSpecificCaretakerId();
  }
  syncViewModeButtons();

  const isCompactView = currentViewMode === "compact";
  if(compactSchoolList) compactSchoolList.hidden = !isCompactView;
  if(schoolListTable) schoolListTable.hidden = isCompactView;

  if(isCompactView){
    renderCompactSchools(schools);
    return;
  }

  let listFragment = document.createDocumentFragment();
  let visibleSchools = schools;

  if (currentViewMode === "caretakers") {
    visibleSchools = schools.slice();
  } else if (currentViewMode === "specific-caretaker") {
    visibleSchools = sortSchools(schools).filter(s => String(s.assignedCaretakerId || "") === String(currentSpecificCaretakerId));
  }

  const filtered = visibleSchools;
  const groups = {};
  const isCaretakerGroupView = currentViewMode === "caretakers" || currentViewMode === "specific-caretaker";

  filtered.forEach(s => {
    const caretakerId = s.assignedCaretakerId || "";
    const key = isCaretakerGroupView ? `caretaker:${caretakerId}` : "all";
    if (!groups[key]) groups[key] = [];
    groups[key].push(s);
  });

  const sortedKeys = Object.keys(groups).sort((a, b) => {
    const nameA = isCaretakerGroupView ? getCaretakerNameById(a.replace("caretaker:", "")) : "Všechny školy";
    const nameB = isCaretakerGroupView ? getCaretakerNameById(b.replace("caretaker:", "")) : "Všechny školy";
    return nameA.localeCompare(nameB, "cs");
  });

  if(sortedKeys.length === 0){
    const emptyRow = document.createElement("tr");
    const emptyCell = document.createElement("td");
    emptyCell.colSpan = 5;
    emptyCell.className = "empty-state-cell";
    emptyCell.textContent = currentViewMode === "specific-caretaker"
      ? "Vybraný školník zatím nemá přiřazené školy."
      : "Žádné školy k zobrazení.";
    emptyRow.appendChild(emptyCell);
    list.replaceChildren(emptyRow);
    return;
  }

  sortedKeys.forEach(key => {
    const groupName = isCaretakerGroupView ? getCaretakerNameById(key.replace("caretaker:", "")) : "";

    if (isCaretakerGroupView) {
      const headerRow = document.createElement("tr");
      headerRow.dataset.caretakerId = key.replace("caretaker:", "");
      headerRow.dataset.groupHeader = "true";
      headerRow.addEventListener("dragover", (event) => {
        event.preventDefault();
      });
      headerRow.addEventListener("dragenter", () => {
        highlightGroup(headerRow);
      });
      headerRow.addEventListener("dragleave", () => {
        clearHighlight(headerRow);
      });
      headerRow.addEventListener("drop", (event) => {
        event.preventDefault();
        clearHighlight(headerRow);

        const schoolId = event.dataTransfer.getData("text/plain");
        if (!schoolId) return;

        assignSchoolToCaretaker(schoolId, headerRow.dataset.caretakerId);
      });

      const headerCell = document.createElement("td");
      headerCell.colSpan = 5;
      headerCell.replaceChildren(createCaretakerInline(key.replace("caretaker:", "")));

      headerRow.appendChild(headerCell);
      listFragment.appendChild(headerRow);
    }

    const groupSchools = sortSchools(groups[key]);

    groupSchools.forEach((s, i) => {
      let row = document.createElement("tr");
      row.draggable = true;
      row.addEventListener("dragstart", (event) => {
        event.dataTransfer.setData("text/plain", s.id);
        event.dataTransfer.effectAllowed = "move";
      });
      if(String(s.id) === String(selectedId) || String(s.id) === String(editId)) row.classList.add("active", "is-selected");

      let orderCell = document.createElement("td");
      orderCell.textContent = i + 1;
      row.appendChild(orderCell);

      let cityCell = document.createElement("td");
      cityCell.className = "col-city";
      cityCell.textContent = s.mesto || TEXTS.common.placeholderDash;
      row.appendChild(cityCell);

      let nameCell = document.createElement("td");
      nameCell.className = "col-name";
      nameCell.textContent = s.nazev;
      row.appendChild(nameCell);

      const caretakerCell = document.createElement("td");
      caretakerCell.replaceChildren(createCaretakerInline(s.assignedCaretakerId));
      row.appendChild(caretakerCell);

      const actionCell = document.createElement("td");
      const editListButton = document.createElement("button");
      editListButton.type = "button";
      editListButton.className = "school-list-action";
      editListButton.textContent = TEXTS.common.edit;
      editListButton.addEventListener("click", (event) => {
        event.stopPropagation();
        edit(s.id);
        showDetail(s.id);
        schoolDetailPanel.scrollIntoView({ block: "start", behavior: "smooth" });
      });
      actionCell.appendChild(editListButton);
      row.appendChild(actionCell);

      listFragment.appendChild(row);
    });
  });

  list.replaceChildren(listFragment);
}

}
if (cancelEditButton) {
  cancelEditButton.addEventListener("click", closeSchoolDetailPanel);
}
viewOptionButtons.forEach(button => {
  button.addEventListener("click", () => {
    if(button.dataset.viewMode === "specific-caretaker"){
      if(currentViewMode !== "specific-caretaker"){
        ensureSpecificCaretakerId();
      }
      currentViewMode = "specific-caretaker";
      toggleSpecificCaretakerDropdown();
      render();
      return;
    }
    closeSpecificCaretakerDropdown();
    currentViewMode = button.dataset.viewMode || "all";
    render();
  });
});
document.addEventListener("click", (event) => {
  if(!event.target.closest(".specific-caretaker-picker")){
    closeSpecificCaretakerDropdown();
  }
});
render();

</script>

</body>
</html>
