<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Školy</title>

<style>
body { font-family: Arial; padding:20px; }

input { margin:2px; width:180px; }

.school-form-row {
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  gap:4px;
}

.favorite-trainers {
  margin:12px 0;
  padding:10px;
  border:1px solid #ccc;
  max-width:760px;
}

.favorite-trainers-title {
  font-weight:bold;
  margin-bottom:8px;
}

.favorite-trainers-list {
  margin-top:8px;
}

.favorite-trainer-search-results {
  margin-top:6px;
  max-width:420px;
}

.favorite-trainer-search-result {
  display:block;
  margin:2px 0;
  padding:3px 6px;
  text-align:left;
}

.favorite-trainer-detail-row {
  display:flex;
  align-items:center;
  padding:4px 6px;
  margin-bottom:2px;
  border-radius:4px;
  background:#f7f7f7;
}

.favorite-trainer-detail-row:hover {
  background:#eeeeee;
}

.favorite-trainer-detail-name {
  width:230px;
  text-align:left;
}

.favorite-trainer-detail-actions {
  display:flex;
  gap:4px;
}

.favorite-trainer-detail-actions button {
  padding:2px 6px;
  font-size:12px;
}

.school-detail-panel {
  margin:14px 0;
  padding:12px;
  max-width:760px;
  border:2px solid #bbb;
  border-radius:6px;
  background:#f8f8f8;
}

.detail-actions {
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  max-width:760px;
  margin:12px 0;
}

.detail-action-buttons {
  display:flex;
  align-items:center;
  gap:6px;
}

.assigned-trainers {
  margin-top:8px;
  padding:8px 10px;
  border:1px solid #ddd;
  border-radius:6px;
  background:#f5f5f5;
}

.school-list-action {
  margin-left:8px;
}

#newSchoolButton {
  border-color:#c00;
  background:#fff0f0;
  box-shadow:0 1px 4px rgba(204,0,0,0.18);
}

table {
  border-collapse: collapse;
  margin-top:10px;
}

td, th {
  border:1px solid #ccc;
  padding:5px 10px;
  text-align:left;
}

.col-name { width:40ch; }
.col-city { width:25ch; }

tr.active {
  background:#2b2b2b !important;
  color:#ff6b6b;
  font-weight:bold;
  outline:2px solid rgba(204,0,0,0.35);
  box-shadow:0 0 6px rgba(204,0,0,0.25);
}

tr.active .school-list-action {
  border-color:#c00;
  background:#fff0f0;
  color:#c00;
  font-weight:bold;
}

tr:hover {
  background:#f5f5f5 !important;
  cursor:pointer;
}

.top-toolbar {
  position:sticky;
  top:0;
  z-index:100;
  display:flex;
  align-items:center;
  gap:4px;
  margin:0 0 12px 0;
  padding:0;
  max-width:100%;
  box-sizing:border-box;
  background:rgba(255,255,255,0.94);
  border:0;
}

.top-toolbar-left,
.top-toolbar-actions,
.top-toolbar-modules {
  display:flex;
  align-items:center;
  gap:4px;
  flex-wrap:nowrap;
}

.top-toolbar a,
.top-toolbar button {
  color:#222;
  font-weight:bold;
  text-decoration:none;
  padding:3px 8px;
  border:1px solid #aaa;
  border-radius:4px;
  background:#f5f5f5;
  transition:background 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease;
}

.top-toolbar a:hover,
.top-toolbar button:hover {
  background:#ffffff;
  box-shadow:0 1px 4px rgba(0,0,0,0.14);
  transform:translateY(-1px);
}

.top-toolbar a.active {
  color:#c00;
  border-color:#c00;
  background:#fff0f0;
}

.top-toolbar a.active:hover {
  background:#ffe8e8;
}
</style>
</head>

<body>

<h2 id="pageTitle"></h2>
<div class="top-toolbar">
  <div class="top-toolbar-left">
    <a href="home.html">🏠 Domů</a>
    <button id="newSchoolButton" type="button">➕ Nová škola</button>
  </div>
  <div class="top-toolbar-actions"></div>
  <div class="top-toolbar-modules">
    <a href="index.html">📅 Rozvrh</a>
    <a class="active" href="schools.html">🏫 Školy</a>
    <a href="caretakers.html">🧹 Školníci</a>
    <a href="trainers.html">🧑‍🏫 Trenéři</a>
    <a href="managers.html">📋 Manažeři</a>
    <a href="reports.html">🧾 Výkazy</a>
  </div>
</div>

<div id="schoolDetailPanel" class="school-detail-panel" hidden>
<h3 id="detailTitle"></h3>
<div id="detail"></div>

<div class="school-form-row">
  <input id="nazev">
  <input id="ulice">
  <input id="mesto">
  <input id="psc">
</div>
<div class="school-form-row">
  <input id="ico">
  <input id="kontakt">
  <input id="email">
  <input id="telefon">
</div>
<label for="assignedCaretakerId">Školník</label>
<select id="assignedCaretakerId"></select>
<br>
<input id="poznamka" style="width:370px">

<div id="favoriteTrainersBox" class="favorite-trainers">
  <div id="favoriteTrainersTitle" class="favorite-trainers-title"></div>
  <input id="favoriteTrainerSearch">
  <div id="favoriteTrainerSearchResults" class="favorite-trainer-search-results"></div>
  <div id="favoriteTrainersList" class="favorite-trainers-list"></div>
</div>

  <div class="detail-actions">
    <div id="detailActionButtons" class="detail-action-buttons">
      <button id="saveButton" onclick="add()"></button>
      <button id="cancelEditButton" type="button">Zrušit</button>
      <button id="removeCaretakerButton">Odebrat školníka</button>
    </div>
    <div id="detailCloseAction"></div>
  </div>
</div>

<h3 id="listTitle"></h3>
<label for="caretakerFilterSelect">Filtr školník</label>
<select id="caretakerFilterSelect"></select>
<br><br>
<table>
  <thead>
    <tr>
      <th>#</th>
      <th id="nameHeader" class="col-name"></th>
      <th>Školník</th>
      <th id="cityHeader" class="col-city"></th>
      <th>Akce</th>
    </tr>
  </thead>
  <tbody id="list"></tbody>
</table>

<script type="module">
import { TEXTS } from "./texts.js";

const pageTitle = document.getElementById("pageTitle");
const backLink = document.getElementById("backLink");
const newSchoolButton = document.getElementById("newSchoolButton");
const schoolDetailPanel = document.getElementById("schoolDetailPanel");
const nazev = document.getElementById("nazev");
const ulice = document.getElementById("ulice");
const mesto = document.getElementById("mesto");
const psc = document.getElementById("psc");
const ico = document.getElementById("ico");
const kontakt = document.getElementById("kontakt");
const email = document.getElementById("email");
const telefon = document.getElementById("telefon");
const assignedCaretakerId = document.getElementById("assignedCaretakerId");
const poznamka = document.getElementById("poznamka");
const favoriteTrainersTitle = document.getElementById("favoriteTrainersTitle");
const favoriteTrainerSearch = document.getElementById("favoriteTrainerSearch");
const favoriteTrainerSearchResults = document.getElementById("favoriteTrainerSearchResults");
const favoriteTrainersList = document.getElementById("favoriteTrainersList");
const saveButton = document.getElementById("saveButton");
const cancelEditButton = document.getElementById("cancelEditButton");
const removeCaretakerButton = document.getElementById("removeCaretakerButton");
const detailActionButtons = document.getElementById("detailActionButtons");
const detailCloseAction = document.getElementById("detailCloseAction");
const detailTitle = document.getElementById("detailTitle");
const detail = document.getElementById("detail");
const listTitle = document.getElementById("listTitle");
const caretakerFilterSelect = document.getElementById("caretakerFilterSelect");
const nameHeader = document.getElementById("nameHeader");
const cityHeader = document.getElementById("cityHeader");
const list = document.getElementById("list");

let schools = JSON.parse(localStorage.getItem("schools")) || [];
let editId = null;
let selectedId = null;
let currentFavoriteTrainerIds = [];

function normalizeSchool(school){
  return {
    ...school,
    favoriteTrainers: school.favoriteTrainers || [],
    assignedTrainerId: school.assignedTrainerId ?? null,
    assignedCaretakerId: school.assignedCaretakerId || ""
  };
}

function normalizeSchools(items){
  return items.map(normalizeSchool);
}

schools = normalizeSchools(schools);

function loadTrainers(){
  try {
    return JSON.parse(localStorage.getItem("trainers")) || [];
  } catch {
    return [];
  }
}

function loadCaretakers(){
  try {
    return JSON.parse(localStorage.getItem("caretakers") || "[]");
  } catch {
    return [];
  }
}

function getCaretakerNameById(caretakerId){
  if (!caretakerId) return "Bez školníka";

  const caretakers = loadCaretakers();
  const item = caretakers.find(c => String(c.id) === String(caretakerId));

  if (!item) return "Bez školníka";

  const fullName = `${item.prijmeni || ""} ${item.jmeno || ""}`.trim();
  return fullName || item.name || "Bez školníka";
}

function getCaretakerColorById(caretakerId){
  if (!caretakerId) return "#ddd";

  const caretakers = loadCaretakers();
  const item = caretakers.find(c => String(c.id) === String(caretakerId));

  return item?.color || "#ddd";
}

function lightenColor(hex, amount = 0.85){
  if (!hex || hex.length < 7) return "";

  const r = parseInt(hex.substring(1,3),16);
  const g = parseInt(hex.substring(3,5),16);
  const b = parseInt(hex.substring(5,7),16);

  const newR = Math.round(r + (255 - r) * amount);
  const newG = Math.round(g + (255 - g) * amount);
  const newB = Math.round(b + (255 - b) * amount);

  return `rgb(${newR}, ${newG}, ${newB})`;
}

function initStaticTexts(){
  pageTitle.textContent = TEXTS.schools.title;
  if(backLink) backLink.textContent = "← Zpět na rozvrh";
  nazev.placeholder = "Název školy";
  ulice.placeholder = "Ulice";
  mesto.placeholder = "Město";
  psc.placeholder = "PSČ";
  ico.placeholder = TEXTS.common.ico;
  kontakt.placeholder = `${TEXTS.schools.contact}ní osoba`;
  email.placeholder = TEXTS.common.email;
  telefon.placeholder = TEXTS.common.phone;
  poznamka.placeholder = TEXTS.common.note;
  favoriteTrainerSearch.placeholder = "Hledat trenéra";
  saveButton.textContent = "Uložit";
  detailTitle.textContent = "Zadání nové školy";
  detail.textContent = TEXTS.schools.detailPrompt;
  listTitle.textContent = "Seznam";
  nameHeader.textContent = "Název školy";
  cityHeader.textContent = "Město";
}

favoriteTrainersTitle.textContent = TEXTS.schools.favoriteTrainers;

function getSelectedFavoriteTrainerIds(){
  return currentFavoriteTrainerIds.slice();
}

function updateFavoriteTrainerLimitState(){
  const limitReached = currentFavoriteTrainerIds.length >= 10;
  favoriteTrainerSearch.disabled = limitReached;
}

function renderFavoriteTrainerSearchResults(){
  const query = favoriteTrainerSearch.value.trim().toLowerCase();
  const selectedIdSet = new Set(currentFavoriteTrainerIds.map(String));
  const fragment = document.createDocumentFragment();

  if(query){
    loadTrainers()
      .filter(trainer => !selectedIdSet.has(String(trainer.id)))
      .filter(trainer =>
        `${trainer.prijmeni || ""} ${trainer.jmeno || ""}`.toLowerCase().includes(query) ||
        `${trainer.jmeno || ""} ${trainer.prijmeni || ""}`.toLowerCase().includes(query)
      )
      .slice(0, 10)
      .forEach(trainer => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "favorite-trainer-search-result";
        button.textContent = `${trainer.prijmeni || ""} ${trainer.jmeno || ""}`.trim();
        button.addEventListener("click", () => addFavoriteTrainerToCurrent(trainer.id));
        fragment.appendChild(button);
      });
  }

  favoriteTrainerSearchResults.replaceChildren(fragment);
}

function renderSelectedFavoriteTrainers(){
  const trainers = loadTrainers();
  const trainersById = new Map(trainers.map(trainer => [String(trainer.id), trainer]));
  const fragment = document.createDocumentFragment();

  currentFavoriteTrainerIds
    .map(id => trainersById.get(String(id)))
    .filter(Boolean)
    .forEach((trainer, index) => {
      const line = document.createElement("div");
      line.className = "favorite-trainer-detail-row";

      const trainerName = document.createElement("span");
      trainerName.className = "favorite-trainer-detail-name";
      trainerName.textContent = `${trainer.prijmeni || ""} ${trainer.jmeno || ""}`.trim();
      line.appendChild(trainerName);

      const buttons = document.createElement("span");
      buttons.className = "favorite-trainer-detail-actions";

      const upButton = document.createElement("button");
      upButton.type = "button";
      upButton.textContent = "↑";
      upButton.disabled = index === 0;
      upButton.addEventListener("click", () => moveCurrentFavoriteTrainer(trainer.id, -1));
      buttons.appendChild(upButton);

      const downButton = document.createElement("button");
      downButton.type = "button";
      downButton.textContent = "↓";
      downButton.disabled = index === currentFavoriteTrainerIds.length - 1;
      downButton.addEventListener("click", () => moveCurrentFavoriteTrainer(trainer.id, 1));
      buttons.appendChild(downButton);

      const removeButton = document.createElement("button");
      removeButton.type = "button";
      removeButton.textContent = "Odebrat";
      removeButton.addEventListener("click", () => removeCurrentFavoriteTrainer(trainer.id));
      buttons.appendChild(removeButton);

      line.appendChild(buttons);
      fragment.appendChild(line);
    });

  if(!fragment.childNodes.length){
    fragment.append(TEXTS.common.placeholderDash);
  }

  favoriteTrainersList.replaceChildren(fragment);
}

function renderFavoriteTrainerOptions(selectedIds = []){
  currentFavoriteTrainerIds = selectedIds.map(String);
  favoriteTrainerSearch.value = "";
  renderFavoriteTrainerSearchResults();
  renderSelectedFavoriteTrainers();
  updateFavoriteTrainerLimitState();
}

function addFavoriteTrainerToCurrent(trainerId){
  const value = String(trainerId);
  if(currentFavoriteTrainerIds.includes(value)) return;
  if(currentFavoriteTrainerIds.length >= 10){
    alert("Maximálně 10 trenérů");
    return;
  }
  currentFavoriteTrainerIds.push(value);
  favoriteTrainerSearch.value = "";
  renderFavoriteTrainerSearchResults();
  renderSelectedFavoriteTrainers();
  updateFavoriteTrainerLimitState();
}

function moveCurrentFavoriteTrainer(trainerId, direction){
  const index = currentFavoriteTrainerIds.findIndex(id => String(id) === String(trainerId));
  const newIndex = index + direction;
  if(index === -1 || newIndex < 0 || newIndex >= currentFavoriteTrainerIds.length) return;
  [currentFavoriteTrainerIds[index], currentFavoriteTrainerIds[newIndex]] = [currentFavoriteTrainerIds[newIndex], currentFavoriteTrainerIds[index]];
  renderSelectedFavoriteTrainers();
}

function removeCurrentFavoriteTrainer(trainerId){
  currentFavoriteTrainerIds = currentFavoriteTrainerIds.filter(id => String(id) !== String(trainerId));
  renderFavoriteTrainerSearchResults();
  renderSelectedFavoriteTrainers();
  updateFavoriteTrainerLimitState();
}

function renderCaretakerSelect(selectedId = ""){
  const select = document.getElementById("assignedCaretakerId");
  if (!select) return;

  const caretakers = loadCaretakers();
  select.innerHTML = "";

  const emptyOption = document.createElement("option");
  emptyOption.value = "";
  emptyOption.textContent = "Bez školníka";
  select.appendChild(emptyOption);

  caretakers.forEach(caretaker => {
    const option = document.createElement("option");
    option.value = String(caretaker.id);

    const surname = caretaker.prijmeni || "";
    const name = caretaker.jmeno || "";
    const fullName = `${surname} ${name}`.trim();

    option.textContent = fullName || caretaker.name || "-";
    option.selected = String(selectedId || "") === String(caretaker.id);
    select.appendChild(option);
  });
}

function renderCaretakerFilter(){
  const select = document.getElementById("caretakerFilterSelect");
  if (!select) return;

  const caretakers = loadCaretakers();
  select.innerHTML = "";

  const allOption = document.createElement("option");
  allOption.value = "";
  allOption.textContent = "Všichni školníci";
  select.appendChild(allOption);

  caretakers.forEach(c => {
    const option = document.createElement("option");
    option.value = String(c.id);

    const fullName = `${c.prijmeni || ""} ${c.jmeno || ""}`.trim();
    option.textContent = fullName || c.name || "-";

    select.appendChild(option);
  });
}

function applyIncomingCaretakerFilter(){
  const select = document.getElementById("caretakerFilterSelect");
  if (!select) return;

  const incomingId = localStorage.getItem("schoolsCaretakerFilter");
  if (!incomingId) return;

  const exists = Array.from(select.options).some(option => String(option.value) === String(incomingId));
  if (exists) {
    select.value = String(incomingId);
  }

  localStorage.removeItem("schoolsCaretakerFilter");
}

function sortSchools(items){
  return items.slice().sort((a, b) => a.nazev.localeCompare(b.nazev));
}

function assignSchoolToCaretaker(schoolId, caretakerId){
  const index = schools.findIndex(s => s.id === schoolId);
  if (index === -1) return;

  schools[index].assignedCaretakerId = caretakerId || "";
  localStorage.setItem("schools", JSON.stringify(schools));

  if (selectedId === schoolId) {
    showDetail(schoolId);
  } else {
    render();
  }
}

function moveFavoriteTrainer(schoolId, trainerId, direction){
  const school = schools.find(s => s.id === schoolId);
  if(!school) return;

  const favoriteTrainers = school.favoriteTrainers || [];
  const index = favoriteTrainers.findIndex(id => String(id) === String(trainerId));
  const newIndex = index + direction;

  if(index === -1 || newIndex < 0 || newIndex >= favoriteTrainers.length) return;

  [favoriteTrainers[index], favoriteTrainers[newIndex]] = [favoriteTrainers[newIndex], favoriteTrainers[index]];
  school.favoriteTrainers = favoriteTrainers;
  localStorage.setItem("schools", JSON.stringify(schools));
  showDetail(schoolId);
}

function removeFavoriteTrainer(schoolId, trainerId){
  const school = schools.find(s => s.id === schoolId);
  if(!school) return;

  school.favoriteTrainers = (school.favoriteTrainers || []).filter(id => String(id) !== String(trainerId));
  localStorage.setItem("schools", JSON.stringify(schools));
  showDetail(schoolId);
}

function highlightGroup(headerRow){
  let next = headerRow.nextElementSibling;

  headerRow.style.background = "#cfe2ff";

  while (next && !next.dataset.groupHeader) {
    next.style.background = "#e7f1ff";
    next = next.nextElementSibling;
  }
}

function clearHighlight(headerRow){
  let next = headerRow.nextElementSibling;

  headerRow.style.background = getCaretakerColorById(headerRow.dataset.caretakerId || "");

  while (next && !next.dataset.groupHeader) {
    next.style.background = "";
    next = next.nextElementSibling;
  }
}

favoriteTrainerSearch.addEventListener("input", renderFavoriteTrainerSearchResults);

function add(){
  if(!nazev.value) return;

  const existingSchool = editId
    ? schools.find(s => String(s.id) === String(editId))
    : null;
  const selectedFavoriteTrainerIds = getSelectedFavoriteTrainerIds();

  let obj = {
    id: editId || Date.now().toString(),
    nazev: nazev.value,
    ulice: ulice.value,
    mesto: mesto.value,
    psc: psc.value,
    ico: ico.value,
    kontakt: kontakt.value,
    email: email.value,
    telefon: telefon.value,
    poznamka: poznamka.value,
    favoriteTrainers: selectedFavoriteTrainerIds,
    assignedTrainerId: existingSchool?.assignedTrainerId ?? null,
    assignedCaretakerId: document.getElementById("assignedCaretakerId")?.value || ""
  };

  if(editId){
    schools = schools.map(s => String(s.id) === String(editId) ? obj : s);
  } else {
    schools.push(obj);
  }

  localStorage.setItem("schools", JSON.stringify(schools));
  const savedEditId = editId;
  clearForm();
  if(savedEditId){
    showDetail(savedEditId);
  } else {
    render();
  }
}

function edit(id){
  let s = schools.find(s => s.id === id);
  if(!s) return;

  editId = id;
  nazev.value = s.nazev || "";
  ulice.value = s.ulice || "";
  mesto.value = s.mesto || "";
  psc.value = s.psc || "";
  ico.value = s.ico || "";
  kontakt.value = s.kontakt || "";
  email.value = s.email || "";
  telefon.value = s.telefon || "";
  poznamka.value = s.poznamka || "";
  renderFavoriteTrainerOptions(s.favoriteTrainers || []);
  renderCaretakerSelect(s.assignedCaretakerId || "");
}

function removeCaretakerFromSchool(){
  if(!editId) return;

  const index = schools.findIndex(s => s.id === editId);
  if(index === -1) return;

  schools[index].assignedCaretakerId = "";

  localStorage.setItem("schools", JSON.stringify(schools));

  showDetail(editId);
  render();
}

function remove(id){
  if(!confirm(TEXTS.schools.removeConfirm)) return;

  schools = schools.filter(s => s.id !== id);
  localStorage.setItem("schools", JSON.stringify(schools));

  detail.textContent = TEXTS.schools.detailPrompt;
  selectedId = null;
  render();
}

function appendDetailTextLine(parent, text){
  parent.append(text, document.createElement("br"));
}

function showDetail(id){
  let s = schools.find(s => s.id === id);
  if(!s) return;

  schoolDetailPanel.hidden = false;
  selectedId = id;
  detailTitle.textContent = "Editace školy";

  let detailFragment = document.createDocumentFragment();

  let title = document.createElement("b");
  title.textContent = `Upravuješ: ${s.nazev}`;
  detailFragment.append(title, document.createElement("br"));

  appendDetailTextLine(detailFragment, `${TEXTS.common.address}: ${s.ulice || TEXTS.common.placeholderDash}, ${s.mesto || TEXTS.common.placeholderDash}, ${s.psc || TEXTS.common.placeholderDash}`);
  appendDetailTextLine(detailFragment, `${TEXTS.common.ico}: ${s.ico || TEXTS.common.placeholderDash}`);
  appendDetailTextLine(detailFragment, `${TEXTS.schools.contact}: ${s.kontakt || TEXTS.common.placeholderDash}`);
  appendDetailTextLine(detailFragment, `${TEXTS.common.phone}: ${s.telefon || TEXTS.common.placeholderDash}`);

  detailFragment.append(`${TEXTS.common.email}: `);
  if(s.email){
    let emailLink = document.createElement("a");
    emailLink.href = `mailto:${s.email}`;
    emailLink.textContent = s.email;
    detailFragment.append(emailLink);
  } else {
    detailFragment.append(TEXTS.common.placeholderDash);
  }
  detailFragment.append(document.createElement("br"));

  appendDetailTextLine(detailFragment, `${TEXTS.common.note}: ${s.poznamka || TEXTS.common.placeholderDash}`);
  detailFragment.append(document.createElement("br"));

  const trainers = loadTrainers();
  const trainersById = new Map(trainers.map(trainer => [String(trainer.id), trainer]));
  const favoriteTrainerItems = (s.favoriteTrainers || [])
    .map(id => trainersById.get(String(id)))
    .filter(Boolean);
  const favoriteTrainerNames = favoriteTrainerItems.map(trainer => `${trainer.prijmeni} ${trainer.jmeno}`);
  const assignedTrainers = document.createElement("div");
  assignedTrainers.className = "assigned-trainers";
  appendDetailTextLine(
    assignedTrainers,
    `${TEXTS.schools.favoriteTrainers}: ${favoriteTrainerNames.length ? favoriteTrainerNames.join(", ") : TEXTS.common.placeholderDash}`
  );
  detailFragment.appendChild(assignedTrainers);
  detailFragment.append(document.createElement("br"));

  let removeButton = document.createElement("button");
  removeButton.id = "detailRemoveButton";
  removeButton.textContent = TEXTS.common.unavailableSymbol;
  removeButton.addEventListener("click", clearForm);

  document.getElementById("detailRemoveButton")?.remove();
  detailCloseAction.appendChild(removeButton);

  detail.replaceChildren(detailFragment);
  render();
}

function clearForm(){
  nazev.value = "";
  ulice.value = "";
  mesto.value = "";
  psc.value = "";
  ico.value = "";
  kontakt.value = "";
  email.value = "";
  telefon.value = "";
  assignedCaretakerId.value = "";
  poznamka.value = "";
  renderFavoriteTrainerOptions([]);
  renderCaretakerSelect("");
  editId = null;
  selectedId = null;
  detailTitle.textContent = "Zadání nové školy";
  detail.textContent = TEXTS.schools.detailPrompt;
  document.getElementById("detailRemoveButton")?.remove();
  schoolDetailPanel.hidden = true;
  render();
}

function render(){
  let listFragment = document.createDocumentFragment();
  const selectedCaretakerId = document.getElementById("caretakerFilterSelect")?.value || "";
  const filtered = selectedCaretakerId
    ? schools.filter(s => String(s.assignedCaretakerId) === String(selectedCaretakerId))
    : schools;
  const groups = {};

  filtered.forEach(s => {
    const key = s.assignedCaretakerId || "";
    if (!groups[key]) groups[key] = [];
    groups[key].push(s);
  });

  const sortedKeys = Object.keys(groups).sort((a, b) => {
    return getCaretakerNameById(a).localeCompare(getCaretakerNameById(b), "cs");
  });

  sortedKeys.forEach(key => {
    const groupName = getCaretakerNameById(key);

    const headerRow = document.createElement("tr");
    headerRow.style.background = getCaretakerColorById(key);
    headerRow.dataset.caretakerId = key;
    headerRow.dataset.groupHeader = "true";
    headerRow.addEventListener("dragover", (event) => {
      event.preventDefault();
    });
    headerRow.addEventListener("dragenter", () => {
      highlightGroup(headerRow);
    });
    headerRow.addEventListener("dragleave", () => {
      clearHighlight(headerRow);
    });
    headerRow.addEventListener("drop", (event) => {
      event.preventDefault();
      clearHighlight(headerRow);

      const schoolId = event.dataTransfer.getData("text/plain");
      if (!schoolId) return;

      assignSchoolToCaretaker(schoolId, headerRow.dataset.caretakerId);
    });

    const headerCell = document.createElement("td");
    headerCell.colSpan = 5;
    headerCell.textContent = groupName;

    headerRow.appendChild(headerCell);
    listFragment.appendChild(headerRow);

    const groupSchools = groups[key]
      .slice()
      .sort((a, b) => a.nazev.localeCompare(b.nazev, "cs"));

    groupSchools.forEach((s, i) => {
      let row = document.createElement("tr");
      const baseColor = getCaretakerColorById(s.assignedCaretakerId);
      const lightColor = lightenColor(baseColor);
      row.draggable = true;
      row.addEventListener("dragstart", (event) => {
        event.dataTransfer.setData("text/plain", s.id);
        event.dataTransfer.effectAllowed = "move";
      });
      if(String(s.id) === String(selectedId) || String(s.id) === String(editId)) row.className = "active";
      if (lightColor && !row.classList.contains("active")) {
        row.style.background = lightColor;
      }
      row.addEventListener("click", () => showDetail(s.id));

      let orderCell = document.createElement("td");
      orderCell.textContent = i + 1;
      row.appendChild(orderCell);

      let nameCell = document.createElement("td");
      nameCell.className = "col-name";
      nameCell.textContent = s.nazev;
      row.appendChild(nameCell);

      const caretakerCell = document.createElement("td");
      caretakerCell.textContent = getCaretakerNameById(s.assignedCaretakerId);
      caretakerCell.style.fontWeight = "bold";
      row.appendChild(caretakerCell);

      let cityCell = document.createElement("td");
      cityCell.className = "col-city";
      cityCell.textContent = s.mesto || TEXTS.common.placeholderDash;
      row.appendChild(cityCell);

      const actionCell = document.createElement("td");
      const editListButton = document.createElement("button");
      editListButton.type = "button";
      editListButton.className = "school-list-action";
      editListButton.textContent = TEXTS.common.edit;
      editListButton.addEventListener("click", (event) => {
        event.stopPropagation();
        edit(s.id);
        showDetail(s.id);
        schoolDetailPanel.scrollIntoView({ block: "start", behavior: "smooth" });
      });
      actionCell.appendChild(editListButton);
      row.appendChild(actionCell);

      listFragment.appendChild(row);
    });
  });

  list.replaceChildren(listFragment);
}

window.add = add;

initStaticTexts();
renderFavoriteTrainerOptions([]);
renderCaretakerSelect("");
renderCaretakerFilter();
applyIncomingCaretakerFilter();
if (newSchoolButton) {
  newSchoolButton.addEventListener("click", () => {
    clearForm();
    schoolDetailPanel.hidden = false;
  });
}
if (removeCaretakerButton) {
  removeCaretakerButton.addEventListener("click", removeCaretakerFromSchool);
}
if (cancelEditButton) {
  cancelEditButton.addEventListener("click", clearForm);
}
if (caretakerFilterSelect) {
  caretakerFilterSelect.addEventListener("change", render);
}
render();

</script>
