<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Trenéři</title>
<link rel="stylesheet" href="styles.css">

<style>

body {
  font-family: Arial;
  padding:20px;
  background:#eef3f7;
  color:var(--color-text);
}

.trainer-detail-panel {
  margin:16px auto;
  padding:18px;
  width:100%;
  max-width:var(--content-max-width);
  border:1px solid var(--color-border);
  border-radius:10px;
  background:#ffffff;
  box-sizing:border-box;
}

#detailTitle {
  margin:0 0 10px;
  color:var(--color-header);
  font-size:16px;
  line-height:1.2;
  text-transform:uppercase;
}

input { margin:2px; }

.trainer-form-row {
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  gap:10px 12px;
  margin-top:10px;
}

.trainer-form-row input {
  box-sizing:border-box;
  min-width:0;
  height:34px;
  margin:0;
  padding:6px 8px;
  border:1px solid var(--color-border);
  border-radius:6px;
  flex:1 1 150px;
}

#detail {
  margin:0 0 14px;
  line-height:1.45;
}

#jmeno,
#prijmeni,
#telefon,
#email,
#ico {
  flex-basis:calc((100% - 48px) / 5);
}

#ulice,
#mesto,
#psc {
  flex-basis:calc((100% - 24px) / 3);
}

#klub,
#poznamka {
  flex-basis:100%;
}

.trainer-detail-actions {
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  flex-wrap:wrap;
  margin-top:18px;
  padding-top:14px;
  border-top:1px solid var(--color-border);
}

.trainer-actions-left,
.trainer-actions-right {
  display:flex;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
}

#deleteTrainerButton {
  color:#c00;
  font-weight:700;
}

.trainer-delete-confirm {
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
  margin-top:8px;
  color:#c00;
  font-weight:700;
}

.trainer-delete-confirm[hidden] {
  display:none;
}

#newTrainerButton {
  border:0;
  background:var(--color-header);
  color:#ffffff;
  box-shadow:0 4px 10px rgba(0,0,0,0.25);
  min-height:40px;
  line-height:1;
  padding:0 18px;
  font-weight:800;
  text-transform:uppercase;
  border-radius:8px;
  cursor:pointer;
  transition:background 0.15s ease, box-shadow 0.15s ease;
}

#newTrainerButton:hover,
#newTrainerButton:focus {
  background:var(--color-primary-dark);
  box-shadow:0 6px 14px rgba(0,0,0,0.3);
}

table {
  border-collapse:separate;
  border-spacing:0;
  width:100%;
  max-width:var(--content-max-width);
  margin:0 auto;
  background:#ffffff;
  border:1px solid #000;
  border-radius:10px;
  overflow:hidden;
  font-size:13px;
  box-sizing:border-box;
}

td, th {
  border:0;
  border-right:1px solid #000;
  border-bottom:1px solid rgba(44,62,85,0.25);
  padding:3px 6px;
  text-align:left;
  line-height:1.2;
}

tr td:last-child,
tr th:last-child {
  border-right:0;
}

th {
  color:#ffffff;
  background:var(--color-header);
  font-weight:bold;
  text-transform:uppercase;
  font-size:13px;
  line-height:1.2;
}

.col-name {
  width:30ch;
}

.col-klub {
  width:30ch;
}

tr.active { background:#eef6fb; }

tr.trainer-available { background:#edf8ef; }
tr.trainer-busy { background:#fbecec; }

tr:hover {
  background:#f0f8fb;
}

tr.active:hover { background:#e3f2f7; }
tr.trainer-available:hover { background:#e3f3e7; }
tr.trainer-busy:hover { background:#f6dddd; }

.compact-trainer-list {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px 12px;
  width:100%;
  max-width:var(--content-max-width);
  margin:0 auto;
  box-sizing:border-box;
}

.compact-trainer-list[hidden] {
  display:none;
}

.compact-trainer-column {
  display:flex;
  flex-direction:column;
  gap:6px;
}

.compact-trainer-item {
  padding:7px 9px;
  border:1px solid rgba(44,62,85,0.12);
  border-radius:6px;
  background:#ffffff;
  box-sizing:border-box;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
}

.compact-trainer-item.trainer-available { background:#edf8ef; }
.compact-trainer-item.trainer-busy { background:#fbecec; }
.compact-trainer-item.active { background:#eef6fb; }

.compact-trainer-main {
  min-width:0;
}

.compact-trainer-title {
  color:var(--color-header);
  font-weight:800;
  font-size:13px;
  line-height:1.2;
}

.compact-trainer-meta {
  margin-top:2px;
  color:#5b6b7c;
  font-size:12px;
  line-height:1.2;
}

.compact-trainer-action {
  flex:0 0 auto;
}

#listTitle {
  display:none;
}

.list-title-banner {
  width:100%;
  max-width:var(--content-max-width);
  box-sizing:border-box;
  background:var(--color-header);
  color:#ffffff;
  font-weight:700;
  padding:10px 14px;
  border-radius:8px;
  margin:18px auto 8px;
}

</style>
</head>

<body>

<div class="page-header">
  <div class="top-toolbar">
    <div class="top-toolbar-left">
      <a href="home.html">Domů</a>
      <a id="backLink" href="index.html">Zpět na Rozvrh</a>
    </div>
  </div>
  <h2 id="pageTitle">TRENÉŘI</h2>
</div>
<div id="selectionModeInfo" hidden></div>

<div class="page-action-box">
  <span class="view-options-title">ZOBRAZENÍ</span>
  <button id="newTrainerButton" type="button">+ NOVÝ TRENÉR</button>
  <div class="view-options">
    <button class="view-option-button is-active" type="button" data-view-mode="all">VŠICHNI TRENÉŘI</button>
    <button class="view-option-button" type="button" data-view-mode="compact">KOMPAKTNÍ ZOBRAZENÍ</button>
  </div>
</div>

<div id="trainerDetailPanel" class="trainer-detail-panel" hidden>
<h3 id="detailTitle"></h3>
<div id="detail"></div>

<div class="trainer-form-row">
  <input id="jmeno">
  <input id="prijmeni">
  <input id="telefon">
  <input id="email">
  <input id="ico">
</div>

<div class="trainer-form-row">
  <input id="ulice">
  <input id="mesto">
  <input id="psc">
</div>

<div class="trainer-form-row">
  <input id="klub">
</div>

<div class="trainer-form-row">
  <input id="poznamka">
</div>

<div class="trainer-detail-actions">
  <div class="trainer-actions-left">
    <button id="deleteTrainerButton" type="button">Smazat trenéra</button>
  </div>
  <div class="trainer-actions-right">
    <button id="saveButton" type="button"></button>
  </div>
</div>
<div id="deleteTrainerConfirm" class="trainer-delete-confirm" hidden>
  <span>Opravdu smazat trenéra?</span>
  <button id="confirmDeleteTrainerButton" type="button">Ano</button>
  <button id="cancelDeleteTrainerButton" type="button">Ne</button>
</div>
</div>

<h3 id="listTitle"></h3>
<input id="trainerSearch" hidden>
<div id="selectionListInfo" hidden></div>
<div class="list-title-banner">SEZNAM TRENÉRŮ</div>
<div id="compactTrainerList" class="compact-trainer-list" hidden></div>
<table>
  <thead>
    <tr>
      <th>#</th>
      <th id="nameHeader" class="col-name"></th>
      <th>Město</th>
      <th id="clubHeader" class="col-klub"></th>
      <th id="availabilityHeader"></th>
      <th id="actionHeader"></th>
    </tr>
  </thead>
  <tbody id="list"></tbody>
</table>

<script type="module">
import { TEXTS } from "./texts.js";

const pageTitle = document.getElementById("pageTitle");
const selectionModeInfo = document.getElementById("selectionModeInfo");
const backLink = document.getElementById("backLink");
const newTrainerButton = document.getElementById("newTrainerButton");
const trainerDetailPanel = document.getElementById("trainerDetailPanel");
const jmeno = document.getElementById("jmeno");
const prijmeni = document.getElementById("prijmeni");
const telefon = document.getElementById("telefon");
const email = document.getElementById("email");
const ico = document.getElementById("ico");
const ulice = document.getElementById("ulice");
const mesto = document.getElementById("mesto");
const psc = document.getElementById("psc");
const klub = document.getElementById("klub");
const poznamka = document.getElementById("poznamka");
const saveButton = document.getElementById("saveButton");
const deleteTrainerButton = document.getElementById("deleteTrainerButton");
const deleteTrainerConfirm = document.getElementById("deleteTrainerConfirm");
const confirmDeleteTrainerButton = document.getElementById("confirmDeleteTrainerButton");
const cancelDeleteTrainerButton = document.getElementById("cancelDeleteTrainerButton");
const detailTitle = document.getElementById("detailTitle");
const detail = document.getElementById("detail");
const listTitle = document.getElementById("listTitle");
const trainerSearch = document.getElementById("trainerSearch");
const selectionListInfo = document.getElementById("selectionListInfo");
const nameHeader = document.getElementById("nameHeader");
const clubHeader = document.getElementById("clubHeader");
const availabilityHeader = document.getElementById("availabilityHeader");
const actionHeader = document.getElementById("actionHeader");
const list = document.getElementById("list");
const compactTrainerList = document.getElementById("compactTrainerList");
const trainerTable = list.closest("table");
const viewOptionButtons = document.querySelectorAll(".view-option-button");
const selectionParam = new URLSearchParams(window.location.search).get("selection");

let trainers = JSON.parse(localStorage.getItem("trainers")) || [];
let availabilityContext = JSON.parse(sessionStorage.getItem("trainerAvailabilityContext") || "null");
let returnContext = JSON.parse(sessionStorage.getItem("scheduleReturnContext") || "null");
const isSelectionMode = selectionParam === "1";
const hasSelectionContext = !!(
  availabilityContext?.date &&
  availabilityContext?.hour &&
  availabilityContext?.cls &&
  availabilityContext?.type &&
  returnContext?.date &&
  returnContext?.hour &&
  returnContext?.cls &&
  returnContext?.type
);
let editId = null;
let selectedId = null;
let currentViewMode = "all";

function initStaticTexts(){
  pageTitle.textContent = TEXTS.trainers.title;
  selectionModeInfo.textContent = "Výběr trenéra pro aktuální buňku rozvrhu";
  selectionModeInfo.hidden = !isSelectionMode;
  backLink.textContent = "Zpět na rozvrh";
  jmeno.placeholder = "Jméno";
  prijmeni.placeholder = "Příjmení";
  telefon.placeholder = TEXTS.common.phone;
  email.placeholder = TEXTS.common.email;
  ico.placeholder = TEXTS.common.ico;
  ulice.placeholder = "Ulice";
  mesto.placeholder = "Město";
  psc.placeholder = "PSČ";
  klub.placeholder = TEXTS.trainers.club;
  poznamka.placeholder = TEXTS.common.note;
  saveButton.textContent = "Uložit a ukončit editaci";
  detailTitle.textContent = "Zadání nového trenéra";
  detail.textContent = TEXTS.trainers.detailPrompt;
  listTitle.textContent = "Seznam";
  trainerSearch.placeholder = "Hledat trenéra";
  trainerSearch.hidden = !isSelectionMode;
  nameHeader.textContent = TEXTS.trainers.title.slice(0, -2);
  clubHeader.textContent = TEXTS.trainers.club;
  availabilityHeader.textContent = "STAV";
  actionHeader.textContent = "Akce";
}

function add(){
  if(!jmeno.value || !prijmeni.value) return;

  let obj = {
    id: editId || Date.now().toString(),
    jmeno: jmeno.value,
    prijmeni: prijmeni.value,
    telefon: telefon.value,
    email: email.value,
    ico: ico.value,
    ulice: ulice.value,
    mesto: mesto.value,
    psc: psc.value,
    klub: klub.value,
    poznamka: poznamka.value
  };

  if(editId){
    trainers = trainers.map(t => t.id === editId ? obj : t);
  } else {
    trainers.push(obj);
  }

  localStorage.setItem("trainers", JSON.stringify(trainers));
  clearForm();
  render();
}

function edit(id){
  let t = trainers.find(t => t.id === id);
  if(!t) return;

  jmeno.value = t.jmeno || "";
  prijmeni.value = t.prijmeni || "";
  telefon.value = t.telefon || "";
  email.value = t.email || "";
  ico.value = t.ico || "";
  ulice.value = t.ulice || "";
  mesto.value = t.mesto || "";
  psc.value = t.psc || "";
  klub.value = t.klub || "";
  poznamka.value = t.poznamka || "";

  editId = id;
}

function remove(id){
  trainers = trainers.filter(t => t.id !== id);
  localStorage.setItem("trainers", JSON.stringify(trainers));

  detail.textContent = TEXTS.trainers.detailPrompt;
  selectedId = null;
  editId = null;
  trainerDetailPanel.hidden = true;
  deleteTrainerButton.hidden = true;
  deleteTrainerConfirm.hidden = true;
  render();
}

function appendDetailTextLine(parent, text){
  parent.append(text, document.createElement("br"));
}

function showDetail(id){
  let t = trainers.find(t => t.id === id);
  if(!t) return;

  trainerDetailPanel.hidden = false;
  selectedId = id;
  detailTitle.textContent = "Detail";
  deleteTrainerButton.hidden = false;
  deleteTrainerConfirm.hidden = true;
  edit(id);

  let detailFragment = document.createDocumentFragment();

  let title = document.createElement("b");
  title.textContent = `${t.prijmeni} ${t.jmeno}`;
  detailFragment.append(title, document.createElement("br"));

  appendDetailTextLine(detailFragment, `${TEXTS.trainers.club}: ${t.klub || TEXTS.common.placeholderDash}`);
  appendDetailTextLine(detailFragment, `${TEXTS.common.ico}: ${t.ico || TEXTS.common.placeholderDash}`);
  appendDetailTextLine(detailFragment, `${TEXTS.common.phone}: ${t.telefon || TEXTS.common.placeholderDash}`);

  detailFragment.append(`${TEXTS.common.email}: `);
  if(t.email){
    let emailLink = document.createElement("a");
    emailLink.href = `mailto:${t.email}`;
    emailLink.textContent = t.email;
    detailFragment.append(emailLink);
  } else {
    detailFragment.append(TEXTS.common.placeholderDash);
  }
  detailFragment.append(document.createElement("br"));

  appendDetailTextLine(detailFragment, `${TEXTS.common.address}: ${t.ulice || TEXTS.common.placeholderDash}, ${t.mesto || TEXTS.common.placeholderDash}, ${t.psc || TEXTS.common.placeholderDash}`);
  appendDetailTextLine(detailFragment, `${TEXTS.common.note}: ${t.poznamka || TEXTS.common.placeholderDash}`);
  detailFragment.append(document.createElement("br"));

  detail.replaceChildren(detailFragment);
  render();
}

function clearForm(){
  jmeno.value = "";
  prijmeni.value = "";
  telefon.value = "";
  email.value = "";
  ico.value = "";
  ulice.value = "";
  mesto.value = "";
  psc.value = "";
  klub.value = "";
  poznamka.value = "";
  editId = null;
  selectedId = null;
  detailTitle.textContent = "Zadání nového trenéra";
  deleteTrainerButton.hidden = true;
  deleteTrainerConfirm.hidden = true;
  detail.textContent = TEXTS.trainers.detailPrompt;
  trainerDetailPanel.hidden = true;
}

function getStoredTrainerId(value){
  return typeof value === "object" ? value?.trainerId : value;
}

function parseScheduleKey(key){
  let parts = key.split("_");
  if(parts.length === 4){
    return { date: parts[0], year: parts[1], cls: parts[2], hour: parts[3] };
  }
  if(parts.length === 3){
    return { date: parts[0], cls: parts[1], hour: parts[2] };
  }
  return null;
}

function isTrainerBusyForAvailabilityContext(trainerId){
  if(!availabilityContext?.date || !availabilityContext?.hour || !availabilityContext?.type) return false;

  const source = availabilityContext.type === "plan"
    ? JSON.parse(localStorage.getItem("plans") || "{}")
    : JSON.parse(localStorage.getItem("reality") || "{}");

  return Object.entries(source).some(([key, value]) => {
    if(String(getStoredTrainerId(value)) !== String(trainerId)) return false;
    if(key === getScheduleKeyFromAvailabilityContext() || key === getLegacyScheduleKeyFromAvailabilityContext()) return false;

    const parsed = parseScheduleKey(key);
    if(!parsed) return false;

    return parsed.date === availabilityContext.date &&
      Number(parsed.hour) === Number(availabilityContext.hour);
  });
}

function getScheduleKeyFromAvailabilityContext(){
  if(!availabilityContext?.date || !availabilityContext?.cls || !availabilityContext?.hour) return "";
  return `${availabilityContext.date}_${availabilityContext.year || ""}_${availabilityContext.cls}_${availabilityContext.hour}`;
}

function getLegacyScheduleKeyFromAvailabilityContext(){
  if(!availabilityContext?.date || !availabilityContext?.cls || !availabilityContext?.hour) return "";
  return `${availabilityContext.date}_${availabilityContext.cls}_${availabilityContext.hour}`;
}

function createPlanStoredValue(trainerId){
  return {
    trainerId,
    schoolId: availabilityContext?.schoolId || "",
    date: availabilityContext?.date || "",
    year: availabilityContext?.year || "",
    className: availabilityContext?.cls || "",
    hour: Number(availabilityContext?.hour)
  };
}

function createRealityStoredValue(trainerId){
  return {
    trainerId,
    schoolId: availabilityContext?.schoolId || "",
    date: availabilityContext?.date || "",
    year: availabilityContext?.year || "",
    className: availabilityContext?.cls || "",
    hour: Number(availabilityContext?.hour)
  };
}

function chooseTrainer(trainerId){
  if(!isSelectionMode || !hasSelectionContext) return;

  const key = getScheduleKeyFromAvailabilityContext();
  if(!key || !availabilityContext?.type) return;

  if(availabilityContext.type === "plan"){
    const plans = JSON.parse(localStorage.getItem("plans") || "{}");
    plans[key] = createPlanStoredValue(trainerId);
    localStorage.setItem("plans", JSON.stringify(plans));
  } else {
    const reality = JSON.parse(localStorage.getItem("reality") || "{}");
    reality[key] = createRealityStoredValue(trainerId);
    localStorage.setItem("reality", JSON.stringify(reality));
  }

  sessionStorage.setItem("recentlyUpdatedScheduleCell", JSON.stringify(availabilityContext));
  window.location.href = "index.html";
}

function renderCompactTrainers(items){
  if(!compactTrainerList) return;

  if(items.length === 0){
    compactTrainerList.replaceChildren();
    return;
  }

  const midpoint = Math.ceil(items.length / 2);
  const columns = [items.slice(0, midpoint), items.slice(midpoint)];
  const fragment = document.createDocumentFragment();

  columns.forEach((columnItems, columnIndex) => {
    const column = document.createElement("div");
    column.className = "compact-trainer-column";

    columnItems.forEach((t, index) => {
      const isBusy = isTrainerBusyForAvailabilityContext(t.id);
      const item = document.createElement("div");
      item.className = "compact-trainer-item";
      if(t.id === selectedId) item.classList.add("active");
      if(isSelectionMode) item.classList.add(isBusy ? "trainer-busy" : "trainer-available");

      const main = document.createElement("div");
      main.className = "compact-trainer-main";

      const title = document.createElement("div");
      title.className = "compact-trainer-title";
      title.textContent = `${columnIndex * midpoint + index + 1}. ${t.prijmeni} ${t.jmeno}`;

      const meta = document.createElement("div");
      meta.className = "compact-trainer-meta";
      meta.textContent = `${t.mesto || ""}${t.klub ? " | " + t.klub : ""}${isSelectionMode ? " | " + (isBusy ? "🔴" : "🟢") : ""}`;

      const actionButton = document.createElement("button");
      actionButton.type = "button";
      actionButton.className = "compact-trainer-action";
      actionButton.textContent = isSelectionMode ? "Zvolit" : TEXTS.common.edit;
      actionButton.disabled = isSelectionMode && (!hasSelectionContext || isBusy);
      actionButton.addEventListener("click", (event) => {
        event.stopPropagation();
        if(isSelectionMode){
          chooseTrainer(t.id);
        } else {
          showDetail(t.id);
        }
      });

      main.appendChild(title);
      main.appendChild(meta);
      item.appendChild(main);
      item.appendChild(actionButton);
      column.appendChild(item);
    });

    fragment.appendChild(column);
  });

  compactTrainerList.replaceChildren(fragment);
}

function render(){
  let listFragment = document.createDocumentFragment();
  const search = isSelectionMode ? trainerSearch.value.trim().toLowerCase() : "";
  let visibleTrainers = trainers;
  let shouldSortTrainers = true;
  selectionListInfo.hidden = !isSelectionMode;

  if(isSelectionMode && search){
    selectionListInfo.textContent = "Výsledky hledání v databázi trenérů";
    visibleTrainers = trainers.filter(t =>
      `${t.prijmeni || ""} ${t.jmeno || ""}`.toLowerCase().includes(search) ||
      `${t.jmeno || ""} ${t.prijmeni || ""}`.toLowerCase().includes(search)
    ).sort((a, b) => {
      if(a.prijmeni < b.prijmeni) return -1;
      if(a.prijmeni > b.prijmeni) return 1;
      return a.jmeno.localeCompare(b.jmeno);
    });
  } else if(isSelectionMode){
    selectionListInfo.textContent = "Volní trenéři";
    visibleTrainers = trainers.filter(t => !isTrainerBusyForAvailabilityContext(t.id));
    if(!visibleTrainers.length) selectionListInfo.textContent = "Žádný volný trenér pro tento čas.";
  }

  const renderedTrainers = shouldSortTrainers ? visibleTrainers.sort((a, b) => {
      if(a.prijmeni < b.prijmeni) return -1;
      if(a.prijmeni > b.prijmeni) return 1;
      return a.jmeno.localeCompare(b.jmeno);
    }) : visibleTrainers;

  const isCompactView = currentViewMode === "compact";
  if(compactTrainerList) compactTrainerList.hidden = !isCompactView;
  if(trainerTable) trainerTable.hidden = isCompactView;
  viewOptionButtons.forEach(button => {
    button.classList.toggle("is-active", button.dataset.viewMode === currentViewMode);
  });

  if(isCompactView){
    renderCompactTrainers(renderedTrainers);
    return;
  }

  renderedTrainers
    .forEach((t, i) => {
      const isBusy = isTrainerBusyForAvailabilityContext(t.id);
      let row = document.createElement("tr");
      if(t.id === selectedId) row.classList.add("active");
      if(isSelectionMode) row.classList.add(isBusy ? "trainer-busy" : "trainer-available");

      let orderCell = document.createElement("td");
      orderCell.textContent = i + 1;
      row.appendChild(orderCell);

      let nameCell = document.createElement("td");
      nameCell.className = "col-name";
      nameCell.textContent = `${t.prijmeni} ${t.jmeno}`;
      row.appendChild(nameCell);

      let cityCell = document.createElement("td");
      cityCell.textContent = t.mesto;
      row.appendChild(cityCell);

      let clubCell = document.createElement("td");
      clubCell.className = "col-klub";
      clubCell.textContent = t.klub || TEXTS.common.placeholderDash;
      row.appendChild(clubCell);

      let availabilityCell = document.createElement("td");
      availabilityCell.textContent = isSelectionMode ? (isBusy ? "🔴" : "🟢") : "—";
      row.appendChild(availabilityCell);

      let actionCell = document.createElement("td");
      let chooseButton = document.createElement("button");
      chooseButton.textContent = isSelectionMode ? "Zvolit" : TEXTS.common.edit;
      chooseButton.disabled = isSelectionMode && (!hasSelectionContext || isBusy);
      chooseButton.addEventListener("click", (event) => {
        event.stopPropagation();
        if(isSelectionMode){
          chooseTrainer(t.id);
        } else {
          showDetail(t.id);
        }
      });
      actionCell.appendChild(chooseButton);
      row.appendChild(actionCell);

      listFragment.appendChild(row);
    });

  list.replaceChildren(listFragment);
}

window.add = add;
trainerSearch.addEventListener("input", render);

initStaticTexts();
saveButton.addEventListener("click", () => {
  const shouldCloseAfterSave = !editId && jmeno.value && prijmeni.value;
  add();
  if(shouldCloseAfterSave){
    trainerDetailPanel.hidden = true;
    selectedId = null;
  }
});
deleteTrainerButton.addEventListener("click", () => {
  if(selectedId) deleteTrainerConfirm.hidden = false;
});
confirmDeleteTrainerButton.addEventListener("click", () => {
  if(selectedId) remove(selectedId);
});
cancelDeleteTrainerButton.addEventListener("click", () => {
  deleteTrainerConfirm.hidden = true;
});
if(newTrainerButton){
  newTrainerButton.addEventListener("click", () => {
    clearForm();
    trainerDetailPanel.hidden = false;
    render();
    jmeno.focus();
  });
}
viewOptionButtons.forEach(button => {
  button.addEventListener("click", () => {
    currentViewMode = button.dataset.viewMode || "all";
    render();
  });
});
render();

</script>

</body>
</html>
